<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>BOSS 分帳 v29 Block版</title>

<style>
body{
  font-family: Arial;
  background:#111;
  color:#fff;
  padding:20px;
}

textarea,input,button,select{
  padding:6px;
  margin:4px;
}

table{
  border-collapse:collapse;
  margin-top:10px;
  background:#1e1e1e;
}

th,td{
  border:1px solid #444;
  padding:6px;
  text-align:center;
  min-width:80px;
}

th{
  background:#2a2a2a;
}
</style>
</head>

<body>

<h2>🏦 BOSS 分帳 v29（Block穩定版）</h2>

<h3>👥 玩家</h3>
<textarea id="players" rows="5"></textarea><br>
<button onclick="setPlayers()">更新玩家</button>

<h3>📦 結標</h3>

<table>
<thead>
<tr>
<th>物品</th>
<th>得標者</th>
<th>金額</th>
<th></th>
</tr>
</thead>
<tbody id="rows"></tbody>
</table>

<button onclick="addRow()">新增列</button>
<button onclick="calc()">計算</button>

<div id="out"></div>

<script>

let P=[];

function setPlayers(){
  P=document.getElementById("players")
    .value.split("\n")
    .map(x=>x.trim())
    .filter(x=>x);
}

function addRow(){
  let tr=document.createElement("tr");
  tr.innerHTML=`
    <td><input></td>
    <td>
      <select class="w">
        ${P.map(p=>`<option>${p}</option>`).join("")}
      </select>
    </td>
    <td><input type="number"></td>
    <td><button onclick="this.parentElement.parentElement.remove()">X</button></td>
  `;
  document.getElementById("rows").appendChild(tr);
}
addRow();

function getData(){
  let d=[];
  document.querySelectorAll("#rows tr").forEach(r=>{
    let item=r.children[0].querySelector("input").value;
    let w=r.children[1].querySelector("select").value;
    let a=Number(r.children[2].querySelector("input").value);
    if(item&&w&&a) d.push({item,winner:w,amount:a});
  });
  return d;
}

/* =========================
   STEP 1：Block 建立（不拆碎）
========================= */
function buildBlocks(data){

  let blocks=[];

  data.forEach(d=>{
    let n=P.length-1;
    let base=Math.floor(d.amount/n);
    let rem=d.amount-base*n;

    let arr=P.filter(p=>p!==d.winner);

    // block = 完整人單位，不拆金額
    arr.forEach(p=>{
      blocks.push({
        item:d.item,
        from:d.winner,
        to:p,
        amount:base
      });
    });

    // residual block（只在最後）
    if(rem>0){
      blocks.push({
        item:d.item,
        from:d.winner,
        to:"RESIDUAL",
        amount:rem
      });
    }
  });

  return blocks;
}

/* =========================
   STEP 2：A/B sequential allocation
========================= */
function allocate(blocks){

  let A={}, B={};

  P.forEach(p=>{
    A[p]=[];
    B[p]=[];
  });

  let payer=["A","B"];

  let Aused=0, Bused=0;

  blocks.forEach(b=>{

    if(b.to==="RESIDUAL"){
      // residual 永遠給 B 收尾
      B["RESIDUAL"]=B["RESIDUAL"]||[];
      B["RESIDUAL"].push(b.amount);
      return;
    }

    // A 先吃全部 block
    if(Aused < 2500){
      A[b.to].push(b.amount);
      Aused += b.amount;
    }
    else{
      B[b.to].push(b.amount);
      Bused += b.amount;
    }
  });

  return {A,B};
}

/* =========================
   STEP 3：render matrix
========================= */
function render(res){

  let html="<h3>📊 A/B 轉帳矩陣（Block版）</h3><table>";

  html+="<tr><th>收款人</th><th>A</th><th>B</th></tr>";

  P.forEach(p=>{
    html+=`
    <tr>
      <td>${p}</td>
      <td>${(res.A[p]||[]).join("<br>")||"-"}</td>
      <td>${(res.B[p]||[]).join("<br>")||"-"}</td>
    </tr>`;
  });

  html+=`
    <tr>
      <td>RESIDUAL</td>
      <td>-</td>
      <td>${(res.B["RESIDUAL"]||[]).join("<br>")||"-"}</td>
    </tr>
  `;

  html+="</table>";

  document.getElementById("out").innerHTML=html;
}

/* =========================
   MAIN
========================= */
function calc(){
  let data=getData();
  let blocks=buildBlocks(data);
  let res=allocate(blocks);
  render(res);
}

</script>

</body>
</html>
