<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>BOSS 分帳 v30</title>

<style>
body{
  font-family: Arial;
  background:#111;
  color:#fff;
  padding:20px;
}

textarea,input,button,select{
  padding:6px;
  margin:4px;
}

table{
  border-collapse:collapse;
  margin-top:10px;
  background:#1e1e1e;
}

th,td{
  border:1px solid #444;
  padding:6px;
  text-align:center;
  min-width:90px;
}

th{
  background:#2a2a2a;
}
</style>
</head>

<body>

<h2>🏦 BOSS 分帳 v30（穩定版）</h2>

<h3>👥 玩家名單</h3>
<textarea id="players" rows="5"></textarea><br>
<button onclick="setPlayers()">更新玩家</button>

<h3>📦 結標</h3>

<table>
<thead>
<tr>
<th>物品</th>
<th>得標者</th>
<th>金額</th>
<th></th>
</tr>
</thead>
<tbody id="rows"></tbody>
</table>

<button onclick="addRow()">新增列</button>
<button onclick="calc()">計算</button>

<div id="out"></div>

<script>

let P = [];

/* =========================
   玩家初始化
========================= */
function setPlayers(){
  P = document.getElementById("players")
    .value.split("\n")
    .map(x => x.trim())
    .filter(x => x);
}

/* =========================
   新增列
========================= */
function addRow(){
  let tr = document.createElement("tr");

  tr.innerHTML = `
    <td><input></td>
    <td>
      <select class="winner">
        ${P.map(p=>`<option>${p}</option>`).join("")}
      </select>
    </td>
    <td><input type="number"></td>
    <td><button onclick="this.parentElement.parentElement.remove()">X</button></td>
  `;

  document.getElementById("rows").appendChild(tr);
}

addRow();

/* =========================
   讀取資料
========================= */
function getData(){
  let data = [];

  document.querySelectorAll("#rows tr").forEach(r=>{
    let item = r.children[0].querySelector("input").value;
    let w = r.children[1].querySelector("select").value;
    let a = Number(r.children[2].querySelector("input").value);

    if(item && w && a){
      data.push({item, winner:w, amount:a});
    }
  });

  return data;
}

/* =========================
   STEP 1：Block 建立（不拆）
========================= */
function buildBlocks(data){

  let blocks = [];

  data.forEach(d => {

    let n = P.length - 1;
    let base = Math.floor(d.amount / n);
    let rem = d.amount - base * n;

    let receivers = P.filter(p => p !== d.winner);

    receivers.forEach(p=>{
      blocks.push({
        item: d.item,
        from: d.winner,
        to: p,
        amount: base
      });
    });

    // residual（只保留，不拆碎）
    if(rem > 0){
      blocks.push({
        item: d.item,
        from: d.winner,
        to: "RESIDUAL",
        amount: rem
      });
    }
  });

  return blocks;
}

/* =========================
   STEP 2：A/B 順序支付
========================= */
function allocate(blocks){

  let A = {}, B = {};
  P.forEach(p=>{
    A[p] = [];
    B[p] = [];
  });

  A["RESIDUAL"] = [];
  B["RESIDUAL"] = [];

  let Aused = 0;
  let limitA = 2500;   // A付款上限
  let limitB = 1265;   // B付款上限

  blocks.forEach(b=>{

    if(b.to === "RESIDUAL"){
      // residual 永遠放 B 收尾
      B["RESIDUAL"].push(b.amount);
      return;
    }

    // A 優先完整吃 block
    if(Aused + b.amount <= limitA){
      A[b.to].push(b.amount);
      Aused += b.amount;
    }else{
      B[b.to].push(b.amount);
    }
  });

  return {A, B};
}

/* =========================
   STEP 3：輸出矩陣
========================= */
function render(res){

  let html = `<h3>📊 轉帳矩陣（v30）</h3><table>`;

  html += `<tr><th>收款人</th><th>A</th><th>B</th></tr>`;

  P.forEach(p=>{
    html += `
      <tr>
        <td>${p}</td>
        <td>${(res.A[p]||[]).join("<br>") || "-"}</td>
        <td>${(res.B[p]||[]).join("<br>") || "-"}</td>
      </tr>
    `;
  });

  html += `
    <tr>
      <td>RESIDUAL</td>
      <td>-</td>
      <td>${(res.B["RESIDUAL"]||[]).join("<br>") || "-"}</td>
    </tr>
  `;

  html += `</table>`;

  document.getElementById("out").innerHTML = html;
}

/* =========================
   MAIN
========================= */
function calc(){
  let data = getData();
  let blocks = buildBlocks(data);
  let res = allocate(blocks);
  render(res);
}

</script>

</body>
</html>
