<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>BOSS 分帳系統V03</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>
body {
  font-family: Arial;
  background:#121212;
  color:#fff;
  padding:20px;
}

textarea, input, select, button {
  padding:6px;
  margin:4px;
}

table {
  border-collapse: collapse;
  margin-top:10px;
  background:#1f1f1f;
}

th, td {
  border:1px solid #444;
  padding:6px;
  text-align:center;
  min-width:80px;
}

#reportArea {
  display:flex;
  flex-direction:column;
  align-items:flex-start;
  gap:20px;
  max-width:1100px;
}

#reportArea table {
  background:white;
  color:black;
  font-size:12px;
  width:max-content;
}

#reportArea th {
  background:#7a7a7a;
  color:#111;
}

#reportArea td {
  background:#f4f4f4;
}
</style>
</head>

<body>

<h2>🏦 BOSS 分帳測試01</h2>

<textarea id="playerPool" rows="5" placeholder="A&#10;B&#10;C"></textarea>
<button onclick="setPlayers()">更新玩家</button>

<table>
<tbody id="rows"></tbody>
</table>

<button onclick="addRow()">新增列</button>
<button onclick="runSettlement()">計算</button>
<button onclick="exportImage()">輸出圖片</button>

<hr>

<div id="reportArea"></div>

<script>

/* =========================
   STATE
========================= */
let players = [];

/* =========================
   玩家更新
========================= */
function setPlayers() {

  players = document.getElementById("playerPool")
    .value.split("\n")
    .map(x => x.trim())
    .filter(x => x);

  refreshAllSelects();
}

/* =========================
   select 同步（安全版）
========================= */
function refreshAllSelects() {

  document.querySelectorAll("#rows tr select").forEach(sel => {

    const oldValue = sel.value;

    sel.innerHTML = `
      <option value="">請選擇得標者</option>
      ${players.map(p => `<option value="${p}">${p}</option>`).join("")}
    `;

    sel.value = players.includes(oldValue) ? oldValue : "";
  });
}

/* =========================
   新增列
========================= */
function addRow() {

  const tr = document.createElement("tr");

  tr.innerHTML = `
    <td><input placeholder="物品"></td>

    <td>
      <select>
        <option value="">請選擇得標者</option>
        ${players.map(p => `<option value="${p}">${p}</option>`).join("")}
      </select>
    </td>

    <td><input type="number" placeholder="金額"></td>

    <td><button onclick="this.parentElement.parentElement.remove()">X</button></td>
  `;

  document.getElementById("rows").appendChild(tr);
}

addRow();

/* =========================
   Ledger
========================= */
function buildLedger() {

  let data = [];

  document.querySelectorAll("#rows tr").forEach(r => {

    const item = r.children[0].querySelector("input").value;
    const winner = r.children[1].querySelector("select").value;
    const amount = Number(r.children[2].querySelector("input").value);

    if (item && winner && amount) {
      data.push({ item, winner, amount });
    }
  });

  return data;
}

/* =========================
   Settlement
========================= */
function settle(ledger) {

  let spend = {}, income = {};

  players.forEach(p => {
    spend[p] = 0;
    income[p] = 0;
  });

  ledger.forEach(l => spend[l.winner] += l.amount);

  const div = players.length - 1;

  ledger.forEach(l => {

    const share = Math.floor(l.amount / div);
    const rem = l.amount - share * div;

    players.forEach(p => {
      if (p !== l.winner) income[p] += share;
    });

    income[l.winner] += rem;
  });

  let bal = {};
  players.forEach(p => bal[p] = income[p] - spend[p]);

  let creditors = players.filter(p => bal[p] > 0);
  let debtors = players.filter(p => bal[p] < 0);

  let transfers = [];

  while (creditors.length && debtors.length) {

    let c = creditors[0];
    let d = debtors[0];

    let pay = Math.min(bal[c], -bal[d]);

    transfers.push({ from: d, to: c, amount: pay });

    bal[c] -= pay;
    bal[d] += pay;

    if (bal[c] === 0) creditors.shift();
    if (bal[d] === 0) debtors.shift();
  }

  return { spend, income, transfers };
}

/* =========================
   optimizer（穩定合併）
========================= */
function optimize(transfers) {

  let map = {};

  transfers.forEach(t => {
    let k = t.from + "->" + t.to;
    map[k] = (map[k] || 0) + t.amount;
  });

  let result = [];

  Object.keys(map).forEach(k => {
    let [from, to] = k.split("->");
    result.push({ from, to, amount: map[k] });
  });

  return result;
}

/* =========================
   UI RENDER（核心修正完成版）
========================= */
function render(spend, income, transfers) {

  let html = `<h3>📊 結算</h3><table>
  <tr><th>玩家</th><th>支出</th><th>收入</th><th>淨值</th></tr>`;

  players.forEach(p => {
    html += `<tr>
      <td>${p}</td>
      <td>${spend[p]}</td>
      <td>${income[p]}</td>
      <td>${income[p] - spend[p]}</td>
    </tr>`;
  });

  html += "</table>";

  /* =========================
     MATRIX（完全穩定版）
  ========================= */

  let map = {};

  // 🔥 UI結構完全固定 players
  players.forEach(r => {
    players.forEach(p => {
      map[r + "->" + p] = "";
    });
  });

  // 填入轉帳
  transfers.forEach(t => {
    map[t.from + "->" + t.to] = t.amount;
  });

  html += `<h3>💸 轉帳明細</h3><table><tr><th></th>`;

  players.forEach(p => html += `<th>${p}</th>`);
  html += "</tr>";

  players.forEach(r => {

    html += `<tr><th>${r}</th>`;

    players.forEach(p => {
      html += `<td>${map[r + "->" + p] || ""}</td>`;
    });

    html += "</tr>";
  });

  html += "</table>";

  document.getElementById("reportArea").innerHTML = html;
}

/* =========================
   RUN
========================= */
function runSettlement() {

  const ledger = buildLedger();

  const { spend, income, transfers } = settle(ledger);

  const optimized = optimize(transfers);

  render(spend, income, optimized);
}

/* =========================
   EXPORT IMAGE
========================= */
function exportImage() {

  const target = document.querySelector("#reportArea table:last-child");

  html2canvas(target, {
    backgroundColor:"#fff",
    scale:2
  }).then(canvas => {

    let a = document.createElement("a");
    a.href = canvas.toDataURL("image/png");
    a.download = "matrix.png";
    a.click();
  });
}

</script>

</body>
</html>
