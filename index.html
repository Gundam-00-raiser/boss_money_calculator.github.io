<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>BOSS 分帳 v30 CLEAN</title>

<style>
body{
  font-family: Arial;
  background:#111;
  color:#fff;
  padding:20px;
}

textarea,input,button{
  padding:6px;
  margin:4px;
}

table{
  border-collapse:collapse;
  margin-top:10px;
  background:#1e1e1e;
}

th,td{
  border:1px solid #444;
  padding:6px;
  text-align:center;
}

th{background:#2a2a2a;}

select{padding:4px;}
</style>
</head>

<body>

<h2>🏦 BOSS 分帳 v30 CLEAN（修正版）</h2>

<h3>👥 玩家</h3>
<textarea id="players" rows="5"></textarea><br>
<button onclick="setPlayers()">更新玩家</button>

<h3>📦 結標</h3>

<table>
<thead>
<tr>
<th>物品</th>
<th>得標者</th>
<th>金額</th>
<th></th>
</tr>
</thead>
<tbody id="rows"></tbody>
</table>

<button onclick="addRow()">新增列</button>
<button onclick="calc()">計算</button>

<div id="out"></div>

<script>

let P = [];

/* =====================
   玩家更新（修正UI）
===================== */
function setPlayers(){
  P = document.getElementById("players")
    .value.split("\n")
    .map(x => x.trim())
    .filter(x => x);

  refreshSelects();
}

/* =====================
   修正 select 同步
===================== */
function refreshSelects(){
  document.querySelectorAll(".winner").forEach(sel=>{
    let cur = sel.value;

    sel.innerHTML = P.map(p => `<option value="${p}">${p}</option>`).join("");

    if(P.includes(cur)){
      sel.value = cur;
    }
  });
}

/* =====================
   新增列
===================== */
function addRow(){

  let tr = document.createElement("tr");

  tr.innerHTML = `
    <td><input></td>
    <td>
      <select class="winner">
        ${P.map(p => `<option value="${p}">${p}</option>`).join("")}
      </select>
    </td>
    <td><input type="number"></td>
    <td><button onclick="this.parentElement.parentElement.remove()">X</button></td>
  `;

  document.getElementById("rows").appendChild(tr);
}

/* =====================
   讀資料
===================== */
function getData(){

  let d = [];

  document.querySelectorAll("#rows tr").forEach(r=>{
    let item = r.children[0].querySelector("input").value;
    let w = r.children[1].querySelector("select").value;
    let a = Number(r.children[2].querySelector("input").value);

    if(item && w && a){
      d.push({item, winner:w, amount:a});
    }
  });

  return d;
}

/* =====================
   核心（維持你原本模型）
===================== */
function calcNet(data){

  let income = {};
  let spend = {};

  P.forEach(p=>{
    income[p] = 0;
    spend[p] = 0;
  });

  data.forEach(d=>{
    let n = P.length - 1;
    let share = d.amount / n;

    spend[d.winner] += d.amount;

    P.forEach(p=>{
      if(p !== d.winner){
        income[p] += share;
      }
    });
  });

  let net = {};

  P.forEach(p=>{
    net[p] = income[p] - spend[p];
  });

  return net;
}

/* =====================
   最少轉帳（穩定版）
===================== */
function buildTransfers(net){

  let creditors = [];
  let debtors = [];

  P.forEach(p=>{
    if(net[p] > 0) creditors.push({p, amt:net[p]});
    if(net[p] < 0) debtors.push({p, amt:-net[p]});
  });

  let res = [];
  let i = 0, j = 0;

  while(i < creditors.length && j < debtors.length){

    let c = creditors[i];
    let d = debtors[j];

    let pay = Math.min(c.amt, d.amt);

    res.push({
      from: d.p,
      to: c.p,
      amount: Number(pay.toFixed(2))
    });

    c.amt -= pay;
    d.amt -= pay;

    if(Math.abs(c.amt) < 0.01) i++;
    if(Math.abs(d.amt) < 0.01) j++;
  }

  return res;
}

/* =====================
   render
===================== */
function render(net, trs){

  let html = "<h3>📊 Net</h3><table>";
  html += "<tr><th>玩家</th><th>淨值</th></tr>";

  P.forEach(p=>{
    html += `<tr><td>${p}</td><td>${net[p].toFixed(2)}</td></tr>`;
  });

  html += "</table>";

  html += "<h3>💸 轉帳明細</h3><table>";
  html += "<tr><th>From</th><th>To</th><th>Amount</th></tr>";

  trs.forEach(t=>{
    html += `<tr><td>${t.from}</td><td>${t.to}</td><td>${t.amount}</td></tr>`;
  });

  html += "</table>";

  document.getElementById("out").innerHTML = html;
}

/* =====================
   MAIN
===================== */
function calc(){
  let data = getData();
  let net = calcNet(data);
  let trs = buildTransfers(net);
  render(net, trs);
}

</script>

</body>
</html>
