<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>BOSS 分帳 v5（逐物品帳務版）</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>
body {
  font-family: Arial;
  background:#111;
  color:#fff;
  padding:20px;
}

textarea, input, select, button {
  padding:6px;
  margin:4px;
}

table {
  border-collapse: collapse;
  margin-top:10px;
  background:#1e1e1e;
}

th, td {
  border:1px solid #444;
  padding:6px;
  text-align:center;
  min-width:90px;
}

.section {
  margin-top:20px;
}

#report {
  margin-top:20px;
}
</style>
</head>

<body>

<h2>🏦 BOSS 分帳 v5（逐物品帳務模型）</h2>

<!-- 玩家 -->
<div class="section">
<h3>👥 玩家清單（貼上）</h3>
<textarea id="playerInput" rows="6" placeholder="A&#10;B&#10;C"></textarea>
<br>
<button onclick="updatePlayers()">更新玩家</button>
</div>

<!-- 結標 -->
<div class="section">
<h3>📦 結標區</h3>

<table>
<thead>
<tr>
  <th>物品</th>
  <th>得標者</th>
  <th>金額</th>
  <th>操作</th>
</tr>
</thead>
<tbody id="rows"></tbody>
</table>

<button onclick="addRow()">新增列</button>
<button onclick="calculate()">計算</button>
</div>

<hr>

<div id="report"></div>

<script>

let players = [];

/* =====================
   更新玩家
===================== */
function updatePlayers() {

  players = document.getElementById("playerInput")
    .value.split("\n")
    .map(x => x.trim())
    .filter(x => x);

  refreshSelects();
}

/* =====================
   dropdown refresh
===================== */
function refreshSelects() {

  document.querySelectorAll(".winner").forEach(sel => {

    const old = sel.value;

    sel.innerHTML =
      `<option value="">選擇得標者</option>` +
      players.map(p => `<option value="${p}">${p}</option>`).join("");

    sel.value = players.includes(old) ? old : "";
  });
}

/* =====================
   新增列
===================== */
function addRow() {

  const tr = document.createElement("tr");

  tr.innerHTML = `
    <td><input></td>
    <td>
      <select class="winner">
        <option value="">選擇得標者</option>
        ${players.map(p => `<option value="${p}">${p}</option>`).join("")}
      </select>
    </td>
    <td><input type="number"></td>
    <td><button onclick="this.parentElement.parentElement.remove()">刪除</button></td>
  `;

  document.getElementById("rows").appendChild(tr);
}

addRow();

/* =====================
   讀取資料
===================== */
function getData() {

  let data = [];

  document.querySelectorAll("#rows tr").forEach(r => {

    const item = r.children[0].querySelector("input").value;
    const winner = r.children[1].querySelector("select").value;
    const amount = Number(r.children[2].querySelector("input").value);

    if (item && winner && amount) {
      data.push({ item, winner, amount });
    }
  });

  return data;
}

/* =====================
   🔥 核心：逐物品帳務模型
===================== */
function buildItemTransfers(data) {

  let transfers = [];

  const n = players.length;

  data.forEach(d => {

    const share = Math.floor(d.amount / (n - 1));
    const remainder = d.amount - share * (n - 1);

    players.forEach(p => {

      if (p === d.winner) return;

      transfers.push({
        from: d.winner,
        to: p,
        amount: share
      });
    });

    // remainder 不影響外部帳（內部修正）
  });

  return transfers;
}

/* =====================
   合併轉帳（避免碎帳）
===================== */
function merge(transfers) {

  let map = {};

  transfers.forEach(t => {

    let key = `${t.from}->${t.to}`;
    map[key] = (map[key] || 0) + t.amount;
  });

  return Object.entries(map).map(([k,v]) => {

    let [from,to] = k.split("->");

    return { from, to, amount: v };
  });
}

/* =====================
   計算
===================== */
function calculate() {

  const data = getData();

  if (players.length < 2) {
    alert("玩家不足");
    return;
  }

  let rawTransfers = buildItemTransfers(data, players);

  let transfers = merge(rawTransfers);

  render(transfers);
}

/* =====================
   render
===================== */
function render(transfers) {

  let html = `<h3>💸 轉帳明細（逐物品模型）</h3>
  <table>
  <tr><th>付款人</th><th>收款人</th><th>金額</th></tr>`;

  transfers.forEach(t => {
    html += `<tr>
      <td>${t.from}</td>
      <td>${t.to}</td>
      <td>${t.amount}</td>
    </tr>`;
  });

  html += "</table>";

  document.getElementById("report").innerHTML = html;
}

</script>

</body>
</html>
