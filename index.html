<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>分帳系統 FINAL（穩定無碎帳版）</title>

<style>
body{
  font-family: Arial;
  background:#111;
  color:#fff;
  padding:20px;
}

textarea,input,button{
  padding:6px;
  margin:4px;
}

table{
  border-collapse:collapse;
  margin-top:10px;
  background:#1e1e1e;
  width:100%;
}

th,td{
  border:1px solid #444;
  padding:6px;
  text-align:center;
}

th{
  background:#2a2a2a;
}

select{
  padding:4px;
}
</style>
</head>

<body>

<h2>🏦 BOSS 分帳 FINAL（穩定版 / 無碎帳）</h2>

<h3>👥 玩家名單（每行一個）</h3>
<textarea id="players" rows="5"></textarea><br>
<button onclick="setPlayers()">更新玩家</button>

<h3>📦 結標輸入</h3>

<table>
<thead>
<tr>
<th>物品</th>
<th>得標者</th>
<th>金額</th>
</tr>
</thead>
<tbody id="rows"></tbody>
</table>

<button onclick="addRow()">新增列</button>
<button onclick="calc()">計算</button>

<div id="out"></div>

<script>

let P = [];

/* =========================
   玩家更新
========================= */
function setPlayers(){
  P = document.getElementById("players")
    .value.split("\n")
    .map(x => x.trim())
    .filter(x => x);
}

/* =========================
   新增列
========================= */
function addRow(){

  let tr = document.createElement("tr");

  tr.innerHTML = `
    <td><input></td>
    <td>
      <select>
        ${P.map(p => `<option value="${p}">${p}</option>`).join("")}
      </select>
    </td>
    <td><input type="number"></td>
  `;

  document.getElementById("rows").appendChild(tr);
}

/* =========================
   讀取資料
========================= */
function getData(){

  let data = [];

  document.querySelectorAll("#rows tr").forEach(r=>{
    let item = r.children[0].querySelector("input").value;
    let winner = r.children[1].querySelector("select").value;
    let amount = Number(r.children[2].querySelector("input").value);

    if(item && winner && amount){
      data.push({item, winner, amount});
    }
  });

  return data;
}

/* =========================
   GAS 原始核心（完全保留）
========================= */
function calcNet(data){

  let income = {};
  let spend = {};

  P.forEach(p=>{
    income[p] = 0;
    spend[p] = 0;
  });

  data.forEach(d=>{

    let n = P.length - 1;
    let share = d.amount / n;

    spend[d.winner] += d.amount;

    P.forEach(p=>{
      if(p !== d.winner){
        income[p] += share;
      }
    });
  });

  let net = {};

  P.forEach(p=>{
    net[p] = income[p] - spend[p];
  });

  return net;
}

/* =========================
   🔥 修正版轉帳矩陣（消除碎帳）
   核心：bucket matching + sort + merge
========================= */
function buildMatrix(net){

  let creditors = [];
  let debtors = [];

  P.forEach(p=>{
    if(net[p] > 0) creditors.push([p, net[p]]);
    if(net[p] < 0) debtors.push([p, -net[p]]);
  });

  // 🔥 重要：排序（避免碎帳）
  creditors.sort((a,b)=>b[1]-a[1]);
  debtors.sort((a,b)=>b[1]-a[1]);

  let res = [];

  let i = 0;
  let j = 0;

  while(i < creditors.length && j < debtors.length){

    let cName = creditors[i][0];
    let cAmt = creditors[i][1];

    let dName = debtors[j][0];
    let dAmt = debtors[j][1];

    let pay = Math.min(cAmt, dAmt);

    if(pay > 0){

      res.push({
        from: dName,
        to: cName,
        amount: Math.round(pay * 100) / 100
      });

      creditors[i][1] -= pay;
      debtors[j][1] -= pay;
    }

    if(creditors[i][1] === 0) i++;
    if(debtors[j][1] === 0) j++;
  }

  return res;
}

/* =========================
   render
========================= */
function render(net, matrix){

  let html = "<h3>📊 Net</h3><table>";
  html += "<tr><th>玩家</th><th>淨值</th></tr>";

  P.forEach(p=>{
    html += `<tr><td>${p}</td><td>${net[p].toFixed(2)}</td></tr>`;
  });

  html += "</table>";

  html += "<h3>💸 轉帳矩陣（已修正碎帳）</h3><table>";
  html += "<tr><th>From</th><th>To</th><th>Amount</th></tr>";

  matrix.forEach(m=>{
    html += `<tr><td>${m.from}</td><td>${m.to}</td><td>${m.amount}</td></tr>`;
  });

  html += "</table>";

  document.getElementById("out").innerHTML = html;
}

/* =========================
   main
========================= */
function calc(){
  let data = getData();
  let net = calcNet(data);
  let matrix = buildMatrix(net);
  render(net, matrix);
}

</script>

</body>
</html>
