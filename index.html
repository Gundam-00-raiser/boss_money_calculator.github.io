<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>隊伍結標分帳計算器 - 12人簡易網頁版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');
        body { font-family: 'Noto Sans TC', system-ui, sans-serif; }
        .bid-row { transition: all 0.2s; }
        table { border-collapse: collapse; }
        th, td { padding: 12px; text-align: left; }
        .result-box { animation: fadeIn 0.3s ease-in; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-gray-50">
    <div class="max-w-6xl mx-auto p-6">
        <div class="flex justify-between items-center mb-8">
            <div>
                <h1 class="text-4xl font-bold text-gray-900 flex items-center gap-3">
                    🧮 隊伍結標分帳計算器
                </h1>
                <p class="text-gray-600 mt-1 text-lg">12人固定隊伍 • 支援替補 • 批次貼上姓名 • 單檔HTML可直接上傳 GitHub Pages</p>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            
            <!-- 左側：玩家名單（預設空白） -->
            <div class="lg:col-span-4 bg-white rounded-3xl shadow-sm p-6 border border-gray-100">
                <h2 class="text-xl font-semibold mb-4 flex items-center gap-2">
                    <span class="text-2xl">👥</span>
                    1. 本場次參與成員（12人）
                </h2>
                <p class="text-gray-500 text-sm mb-4">可從下方文字方塊「批次貼上」一整列姓名（一行一個人）</p>
                
                <!-- 批次貼上區域 -->
                <div class="mb-6">
                    <label class="block text-sm font-medium text-gray-600 mb-2">從其他文件複製姓名後貼在這裡（一行一人）</label>
                    <textarea id="batch-paste" rows="6" 
                              class="w-full resize-y border border-gray-300 rounded-2xl p-4 text-sm focus:outline-none focus:border-indigo-500"
                              placeholder="例如：
王小明
李小華
張大維
..."></textarea>
                    <button onclick="batchPastePlayers()" 
                            class="mt-3 w-full py-3 bg-indigo-600 hover:bg-indigo-700 text-white rounded-2xl font-medium transition-colors">
                        📋 批次貼上到下方12個欄位
                    </button>
                </div>

                <div id="players-grid" class="grid grid-cols-2 gap-3"></div>
                
                <div class="flex gap-3 mt-6">
                    <button onclick="clearPlayers()" 
                            class="flex-1 px-6 py-3 bg-red-100 hover:bg-red-200 text-red-700 rounded-2xl text-sm font-medium transition-colors">
                        🗑️ 清空全部玩家
                    </button>
                </div>
            </div>

            <!-- 右側：結標物品（不變） -->
            <div class="lg:col-span-8 bg-white rounded-3xl shadow-sm p-6 border border-gray-100">
                <h2 class="text-xl font-semibold mb-4 flex items-center gap-2">
                    <span class="text-2xl">🏆</span>
                    2. 結標物品（可自由新增）
                </h2>
                <p class="text-gray-500 text-sm mb-4">得標人會自動從上方玩家名單產生下拉選單</p>
                
                <table class="w-full mb-4" id="bids-table">
                    <thead>
                        <tr class="bg-gray-100 text-gray-600 text-sm">
                            <th class="rounded-tl-2xl pl-4">物品名稱（選填）</th>
                            <th>得標人</th>
                            <th class="text-right">金額（元）</th>
                            <th class="w-12 rounded-tr-2xl"></th>
                        </tr>
                    </thead>
                    <tbody id="bids-body" class="text-sm"></tbody>
                </table>
                
                <button onclick="addBidRow()" 
                        class="w-full py-4 border-2 border-dashed border-gray-300 hover:border-indigo-300 text-gray-500 hover:text-indigo-600 rounded-3xl flex items-center justify-center gap-2 text-lg font-medium transition-all">
                    <span class="text-2xl leading-none">+</span> 新增一筆結標物品
                </button>
            </div>
        </div>

        <!-- 計算按鈕 -->
        <div class="mt-8 text-center">
            <button onclick="calculate()" 
                    class="px-16 py-6 bg-gradient-to-r from-indigo-600 to-violet-600 text-white text-2xl font-bold rounded-3xl shadow-lg hover:shadow-2xl active:scale-95 transition-all flex items-center gap-4 mx-auto">
                <span>🚀 開始計算分帳</span>
                <span class="text-3xl">📊</span>
            </button>
        </div>

        <!-- 結果區（保持不變） -->
        <div id="result" class="result-box hidden mt-12 bg-white rounded-3xl shadow-sm p-8 border border-gray-100">
            <!-- ... 結果內容與之前版本相同 ... -->
            <div class="flex justify-between items-baseline mb-6">
                <h2 class="text-3xl font-bold">計算結果</h2>
                <button onclick="copyResult()" 
                        class="px-5 py-2 text-sm border border-gray-300 hover:bg-gray-100 rounded-2xl flex items-center gap-2">
                    📋 複製結果
                </button>
            </div>
            
            <div id="summary" class="grid grid-cols-3 gap-6 mb-8"></div>
            
            <div class="mb-10">
                <h3 class="text-lg font-semibold mb-3 flex items-center gap-2">👤 每位玩家明細</h3>
                <div id="player-stats" class="overflow-x-auto"></div>
            </div>
            
            <div>
                <h3 class="text-lg font-semibold mb-3 flex items-center gap-2">💸 建議轉帳清單（已壓縮轉帳次數）</h3>
                <div class="bg-gray-50 rounded-3xl p-6">
                    <ol id="transfers-list" class="space-y-4 text-base"></ol>
                    <div id="transfer-note" class="mt-6 text-sm"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 全域變數
        let players = Array(12).fill('');   // 預設空白
        let bids = [];

        // 渲染玩家名單（空白）
        function renderPlayers() {
            const grid = document.getElementById('players-grid');
            grid.innerHTML = '';
            players.forEach((name, i) => {
                const div = document.createElement('div');
                div.className = 'flex items-center bg-gray-50 rounded-2xl px-4 py-3';
                div.innerHTML = `
                    <div class="w-8 h-8 bg-indigo-100 text-indigo-600 rounded-2xl flex items-center justify-center text-sm font-bold">${i + 1}</div>
                    <input type="text" 
                           value="${name}" 
                           class="flex-1 ml-3 bg-transparent outline-none text-base font-medium"
                           onchange="updatePlayer(${i}, this.value)"
                           placeholder="輸入姓名">
                `;
                grid.appendChild(div);
            });
        }

        function updatePlayer(i, val) {
            players[i] = val.trim();
        }

        // 批次貼上功能（核心修改）
        function batchPastePlayers() {
            const textarea = document.getElementById('batch-paste');
            const lines = textarea.value.trim().split(/\r?\n/);   // 支援 Windows / Mac 換行
            
            // 清空現有玩家
            players = Array(12).fill('');
            
            // 填入前12行
            for (let i = 0; i < Math.min(12, lines.length); i++) {
                players[i] = lines[i].trim();
            }
            
            renderPlayers();
            
            // 清空textarea（可選）
            // textarea.value = '';
            
            alert(`✅ 已成功貼上 ${Math.min(12, lines.length)} 位玩家姓名！`);
        }

        function clearPlayers() {
            if (confirm('確定要清空全部12位玩家姓名嗎？')) {
                players = Array(12).fill('');
                renderPlayers();
                if (bids.length > 0) renderBids();
            }
        }

        // 結標物品相關函式（與之前相同）
        function renderBids() {
            const tbody = document.getElementById('bids-body');
            tbody.innerHTML = '';
            
            bids.forEach((bid, idx) => {
                const row = document.createElement('tr');
                row.className = 'bid-row border-b last:border-0 hover:bg-gray-50';
                
                let optionsHTML = players.map(p => {
                    const selected = p === bid.winner ? 'selected' : '';
                    return `<option value="${p}" ${selected}>${p || '(空白)'}</option>`;
                }).join('');
                
                row.innerHTML = `
                    <td class="pl-4">
                        <input type="text" value="${bid.item || ''}" 
                               class="w-full bg-transparent outline-none text-base"
                               placeholder="物品名稱"
                               onchange="updateBid(${idx}, 'item', this.value)">
                    </td>
                    <td>
                        <select onchange="updateBid(${idx}, 'winner', this.value)" 
                                class="w-full bg-transparent outline-none text-base font-medium">
                            ${optionsHTML}
                        </select>
                    </td>
                    <td class="text-right pr-4">
                        <input type="number" value="${bid.amount || ''}" step="1" min="1"
                               class="w-28 text-right bg-transparent outline-none text-base font-semibold"
                               onchange="updateBid(${idx}, 'amount', parseFloat(this.value) || 0)">
                    </td>
                    <td>
                        <button onclick="deleteBid(${idx})" 
                                class="w-8 h-8 flex items-center justify-center text-red-400 hover:text-red-600 hover:bg-red-100 rounded-2xl">×</button>
                    </td>
                `;
                tbody.appendChild(row);
            });
            
            if (bids.length === 0) {
                const emptyRow = document.createElement('tr');
                emptyRow.innerHTML = `<td colspan="4" class="text-center py-12 text-gray-400">尚未新增任何結標物品</td>`;
                tbody.appendChild(emptyRow);
            }
        }

        function updateBid(idx, field, value) {
            bids[idx][field] = value;
        }

        function addBidRow() {
            const defaultWinner = players[0] || '';
            bids.push({ item: '', winner: defaultWinner, amount: 0 });
            renderBids();
        }

        function deleteBid(idx) {
            bids.splice(idx, 1);
            renderBids();
        }

        // calculate()、showResult()、copyResult() 函式與之前版本幾乎相同（只調整少數細節）
        // 為了節省篇幅，這裡省略完全相同的部分。你可以直接把之前版本的 calculate、showResult、copyResult 複製貼上即可。
        // 如果需要我把完整最終版一次貼出來，請再告訴我。

        // 啟動
        window.onload = function () {
            renderPlayers();   // 預設空白
            renderBids();
            console.log('%c✅ 更新版計算器已就緒：玩家區預設空白 + 支援批次貼上', 'color: #6366f1; font-size: 13px');
        }
    </script>
</body>
</html>
