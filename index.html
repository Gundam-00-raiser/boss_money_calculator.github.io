<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>BOSS 分帳 v13（穩定矩陣版）</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>
body {
  font-family: Arial;
  background:#0f0f0f;
  color:#fff;
  padding:20px;
}

textarea, input, select, button {
  margin:4px;
  padding:6px;
}

table {
  border-collapse: collapse;
  margin-top:10px;
  background:#1e1e1e;
}

th, td {
  border:1px solid #444;
  padding:6px;
  text-align:center;
  min-width:80px;
}

h3 { margin-top:20px; }

#report {
  margin-top:20px;
}
</style>
</head>

<body>

<h2>🏦 BOSS 分帳 v13（穩定矩陣版）</h2>

<!-- 玩家 -->
<h3>👥 玩家名單</h3>
<textarea id="playersInput" rows="6" placeholder="A&#10;B&#10;C"></textarea>
<br>
<button onclick="updatePlayers()">更新玩家</button>

<!-- 結標 -->
<h3>📦 結標</h3>

<table>
<thead>
<tr>
  <th>物品</th>
  <th>得標者</th>
  <th>金額</th>
  <th>刪除</th>
</tr>
</thead>
<tbody id="rows"></tbody>
</table>

<button onclick="addRow()">新增列</button>
<button onclick="calculate()">計算</button>

<hr>

<div id="report"></div>

<script>

let players = [];

/* =====================
   更新玩家
===================== */
function updatePlayers() {

  players = document.getElementById("playersInput")
    .value.split("\n")
    .map(x => x.trim())
    .filter(x => x);

  refreshDropdowns();
}

/* =====================
   dropdown
===================== */
function refreshDropdowns() {

  document.querySelectorAll(".winner").forEach(sel => {

    const old = sel.value;

    sel.innerHTML =
      `<option value="">選擇得標者</option>` +
      players.map(p => `<option value="${p}">${p}</option>`).join("");

    sel.value = players.includes(old) ? old : "";
  });
}

/* =====================
   新增列
===================== */
function addRow() {

  const tr = document.createElement("tr");

  tr.innerHTML = `
    <td><input></td>
    <td>
      <select class="winner">
        <option value="">選擇得標者</option>
        ${players.map(p => `<option value="${p}">${p}</option>`).join("")}
      </select>
    </td>
    <td><input type="number"></td>
    <td><button onclick="this.parentElement.parentElement.remove()">X</button></td>
  `;

  document.getElementById("rows").appendChild(tr);
}

addRow();

/* =====================
   讀取資料
===================== */
function getData() {

  let data = [];

  document.querySelectorAll("#rows tr").forEach(r => {

    const item = r.children[0].querySelector("input").value;
    const winner = r.children[1].querySelector("select").value;
    const amount = Number(r.children[2].querySelector("input").value);

    if (item && winner && amount) {
      data.push({ item, winner, amount });
    }
  });

  return data;
}

/* =====================
   ledger（核心）
===================== */
function computeLedger(data) {

  let income = {};
  let spend = {};

  players.forEach(p => {
    income[p] = 0;
    spend[p] = 0;
  });

  data.forEach(d => {

    const n = players.length - 1;
    const share = Math.floor(d.amount / n);
    let remainder = d.amount - share * n;

    spend[d.winner] += d.amount;

    players.forEach(p => {
      if (p !== d.winner) {
        income[p] += share;
      }
    });

    distributeRemainder(d.winner, remainder, income);
  });

  let net = {};
  players.forEach(p => {
    net[p] = income[p] - spend[p];
  });

  return { income, spend, net };
}

/* =====================
   remainder（≥50）
===================== */
function distributeRemainder(winner, remainder, income) {

  if (remainder <= 0) return;

  let targets = players
    .filter(p => p !== winner)
    .sort((a,b) => income[a] - income[b]);

  let i = 0;

  while (remainder > 0 && i < targets.length) {

    let give = Math.min(50, remainder);

    if (give < 50) {
      // 最後不足50 → 丟給最後一人
      give = remainder;
    }

    income[targets[i]] += give;
    remainder -= give;
    i++;
  }
}

/* =====================
   🔥 transfer 重建（關鍵修復）
===================== */
function buildTransfers(data) {

  let transfers = [];

  const n = players.length - 1;

  data.forEach(d => {

    const share = Math.floor(d.amount / n);

    players.forEach(p => {

      if (p !== d.winner) {
        transfers.push({
          from: d.winner,
          to: p,
          amount: share
        });
      }
    });
  });

  return transfers;
}

/* =====================
   matrix
===================== */
function buildMatrix(transfers) {

  let matrix = {};

  players.forEach(r => {
    matrix[r] = {};
    players.forEach(c => {
      matrix[r][c] = 0;
    });
  });

  transfers.forEach(t => {
    matrix[t.from][t.to] += t.amount;
  });

  return matrix;
}

/* =====================
   主計算
===================== */
function calculate() {

  if (players.length < 2) {
    alert("玩家不足");
    return;
  }

  const data = getData();

  const ledger = computeLedger(data);

  const transfers = buildTransfers(data);

  const matrix = buildMatrix(transfers);

  render(ledger, matrix);
}

/* =====================
   render
===================== */
function render(ledger, matrix) {

  let html = `
  <h3>📊 結算結果</h3>
  <table>
  <tr><th>玩家</th><th>支出</th><th>收入</th><th>淨值</th></tr>
  `;

  players.forEach(p => {
    html += `
      <tr>
        <td>${p}</td>
        <td>${ledger.spend[p]}</td>
        <td>${ledger.income[p]}</td>
        <td>${ledger.net[p]}</td>
      </tr>`;
  });

  html += "</table>";

  // ===== matrix =====
  html += `<h3>🔁 轉帳明細</h3><table><tr><th>收款人\\付款人</th>`;

  players.forEach(p => {
    html += `<th>${p}</th>`;
  });

  html += `</tr>`;

  players.forEach(r => {

    html += `<tr><th>${r}</th>`;

    players.forEach(c => {
      html += `<td>${matrix[r][c] || ""}</td>`;
    });

    html += `</tr>`;
  });

  html += `</table>`;

  document.getElementById("report").innerHTML = html;
}

</script>

</body>
</html>
