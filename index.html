<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>BOSS 分帳 v12（約束最終版）</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>
body {
  font-family: Arial;
  background:#0f0f0f;
  color:#fff;
  padding:20px;
}

textarea, input, select, button {
  margin:4px;
  padding:6px;
}

table {
  border-collapse: collapse;
  margin-top:10px;
  background:#1e1e1e;
}

th, td {
  border:1px solid #444;
  padding:6px;
  text-align:center;
  min-width:90px;
}

h3 { margin-top:20px; }

#report {
  margin-top:20px;
}
</style>
</head>

<body>

<h2>🏦 BOSS 分帳 v12（最終約束版）</h2>

<!-- 玩家 -->
<h3>👥 玩家名單</h3>
<textarea id="playersInput" rows="6" placeholder="A&#10;B&#10;C"></textarea>
<br>
<button onclick="updatePlayers()">更新玩家</button>

<!-- 結標 -->
<h3>📦 結標</h3>

<table>
<thead>
<tr>
  <th>物品</th>
  <th>得標者</th>
  <th>金額</th>
  <th>刪除</th>
</tr>
</thead>
<tbody id="rows"></tbody>
</table>

<button onclick="addRow()">新增品項</button>
<button onclick="calculate()">計算</button>

<hr>

<div id="report"></div>

<script>

let players = [];

/* =====================
   玩家更新
===================== */
function updatePlayers() {

  players = document.getElementById("playersInput")
    .value.split("\n")
    .map(x => x.trim())
    .filter(x => x);

  refreshDropdowns();
}

/* =====================
   下拉更新
===================== */
function refreshDropdowns() {

  document.querySelectorAll(".winner").forEach(sel => {

    const old = sel.value;

    sel.innerHTML =
      `<option value="">選擇得標者</option>` +
      players.map(p => `<option value="${p}">${p}</option>`).join("");

    sel.value = players.includes(old) ? old : "";
  });
}

/* =====================
   新增列
===================== */
function addRow() {

  const tr = document.createElement("tr");

  tr.innerHTML = `
    <td><input></td>
    <td>
      <select class="winner">
        <option value="">選擇得標者</option>
        ${players.map(p => `<option value="${p}">${p}</option>`).join("")}
      </select>
    </td>
    <td><input type="number"></td>
    <td><button onclick="this.parentElement.parentElement.remove()">X</button></td>
  `;

  document.getElementById("rows").appendChild(tr);
}

addRow();

/* =====================
   讀取資料
===================== */
function getData() {

  let data = [];

  document.querySelectorAll("#rows tr").forEach(r => {

    const item = r.children[0].querySelector("input").value;
    const winner = r.children[1].querySelector("select").value;
    const amount = Number(r.children[2].querySelector("input").value);

    if (item && winner && amount) {
      data.push({ item, winner, amount });
    }
  });

  return data;
}

/* =====================
   核心：逐物品分攤
===================== */
function computeLedger(data) {

  let income = {};
  let spend = {};

  players.forEach(p => {
    income[p] = 0;
    spend[p] = 0;
  });

  data.forEach(d => {

    const n = players.length - 1;
    const share = Math.floor(d.amount / n);
    let remainder = d.amount - share * n;

    // spend
    spend[d.winner] += d.amount;

    // income
    players.forEach(p => {
      if (p !== d.winner) {
        income[p] += share;
      }
    });

    // remainder buffer（不碎帳）
    distributeRemainder(d.winner, remainder, income);
  });

  let net = {};
  players.forEach(p => {
    net[p] = income[p] - spend[p];
  });

  return { income, spend, net };
}

/* =====================
   remainder 分配（≥50限制）
===================== */
function distributeRemainder(winner, remainder, income) {

  if (remainder <= 0) return;

  // 找最低收入者（不含 winner）
  let targets = players
    .filter(p => p !== winner)
    .sort((a,b) => income[a] - income[b]);

  let i = 0;

  while (remainder >= 50 && i < targets.length) {

    let give = Math.min(remainder, 50 * Math.ceil(remainder / 50));

    // 強制 ≥50
    if (give < 50) give = remainder;

    income[targets[i]] += give;
    remainder -= give;

    i++;
  }
}

/* =====================
   計算
===================== */
function calculate() {

  if (players.length < 2) {
    alert("玩家不足");
    return;
  }

  const data = getData();
  const result = computeLedger(data);

  render(result);
}

/* =====================
   render
===================== */
function render(result) {

  let html = `
  <h3>📊 結算結果</h3>
  <table>
  <tr><th>玩家</th><th>支出</th><th>收入</th><th>淨值</th></tr>
  `;

  players.forEach(p => {

    html += `
      <tr>
        <td>${p}</td>
        <td>${result.spend[p]}</td>
        <td>${result.income[p]}</td>
        <td>${result.net[p]}</td>
      </tr>
    `;
  });

  html += "</table>";

  document.getElementById("report").innerHTML = html;
}

</script>

</body>
</html>
