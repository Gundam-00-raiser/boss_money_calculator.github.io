<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>BOSS 分帳系統 V7</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>
body {
  font-family: Arial;
  background:#121212;
  color:#fff;
  padding:20px;
}

textarea, input, select, button {
  padding:6px;
  margin:4px;
}

table {
  border-collapse: collapse;
  margin-top:10px;
  background:#1f1f1f;
}

th, td {
  border:1px solid #444;
  padding:6px;
  text-align:center;
  min-width:80px;
}

#reportArea {
  display:flex;
  flex-direction:column;
  align-items:flex-start;
  gap:20px;
  max-width:1200px;
}

#reportArea table {
  background:white;
  color:black;
  font-size:12px;
  width:max-content;
}

#reportArea th {
  background:#666;
  color:#111;
}

#reportArea td {
  background:#f4f4f4;
}
</style>
</head>

<body>

<h2>🏦 BOSS 分帳系統 v7</h2>

<textarea id="playerPool" rows="5" placeholder="A&#10;B&#10;C"></textarea>
<button onclick="setPlayers()">更新玩家</button>

<table>
<tbody id="rows"></tbody>
</table>

<button onclick="addRow()">新增列</button>
<button onclick="run()">計算</button>
<button onclick="exportImage()">輸出圖片</button>

<hr>

<div id="reportArea"></div>

<script>

/* =========================
   STATE
========================= */
let players = [];
let orderedPlayers = [];

/* =========================
   更新玩家（鎖定順序）
========================= */
function setPlayers() {

  players = document.getElementById("playerPool")
    .value.split("\n")
    .map(x => x.trim())
    .filter(x => x);

  orderedPlayers = [...players];

  refreshSelects();
}

/* =========================
   select 安全更新
========================= */
function refreshSelects() {

  document.querySelectorAll("#rows tr select").forEach(sel => {

    const old = sel.value;

    sel.innerHTML = `
      <option value="">請選擇得標者</option>
      ${orderedPlayers.map(p => `<option value="${p}">${p}</option>`).join("")}
    `;

    sel.value = orderedPlayers.includes(old) ? old : "";
  });
}

/* =========================
   新增列
========================= */
function addRow() {

  const tr = document.createElement("tr");

  tr.innerHTML = `
    <td><input placeholder="物品"></td>

    <td>
      <select>
        <option value="">請選擇得標者</option>
        ${orderedPlayers.map(p => `<option value="${p}">${p}</option>`).join("")}
      </select>
    </td>

    <td><input type="number" placeholder="金額"></td>

    <td><button onclick="this.parentElement.parentElement.remove()">X</button></td>
  `;

  document.getElementById("rows").appendChild(tr);
}

addRow();

/* =========================
   Ledger
========================= */
function buildLedger() {

  let data = [];

  document.querySelectorAll("#rows tr").forEach(r => {

    const item = r.children[0].querySelector("input").value;
    const winner = r.children[1].querySelector("select").value;
    const amount = Number(r.children[2].querySelector("input").value);

    if (item && winner && amount) {
      data.push({ item, winner, amount });
    }
  });

  return data;
}

/* =========================
   NET CALC（核心）
========================= */
function computeNet(ledger) {

  let spend = {}, income = {};

  orderedPlayers.forEach(p => {
    spend[p] = 0;
    income[p] = 0;
  });

  // spend
  ledger.forEach(l => {
    spend[l.winner] += l.amount;
  });

  // income（平均分配 + 尾差吸收）
  ledger.forEach(l => {

    const others = orderedPlayers.filter(p => p !== l.winner);

    const base = Math.floor(l.amount / others.length);
    let remainder = l.amount % others.length;

    others.forEach((p, i) => {
      income[p] += base;

      // 尾差吸收
      if (i === others.length - 1) {
        income[p] += remainder;
      }
    });
  });

  // net
  let net = {};
  orderedPlayers.forEach(p => {
    net[p] = income[p] - spend[p];
  });

  return { spend, income, net };
}

/* =========================
   TRANSFER OPTIMIZER
========================= */
function buildTransfers(net) {

  let creditors = [];
  let debtors = [];

  orderedPlayers.forEach(p => {
    if (net[p] > 0) creditors.push({ p, v: net[p] });
    if (net[p] < 0) debtors.push({ p, v: -net[p] });
  });

  let transfers = [];

  while (creditors.length && debtors.length) {

    let c = creditors[0];
    let d = debtors[0];

    let pay = Math.min(c.v, d.v);

    // 防碎策略
    if (pay < 50 && creditors.length > 1 && debtors.length > 1) {
      creditors.push(creditors.shift());
      continue;
    }

    transfers.push({
      from: d.p,
      to: c.p,
      amount: pay
    });

    c.v -= pay;
    d.v -= pay;

    if (c.v === 0) creditors.shift();
    if (d.v === 0) debtors.shift();
  }

  return transfers;
}

/* =========================
   RENDER（完全穩定矩陣）
========================= */
function render(spend, income, net, transfers) {

  let html = `<h3>📊 結算</h3><table>
  <tr><th>玩家</th><th>支出</th><th>收入</th><th>淨值</th></tr>`;

  orderedPlayers.forEach(p => {
    html += `<tr>
      <td>${p}</td>
      <td>${spend[p]}</td>
      <td>${income[p]}</td>
      <td>${net[p]}</td>
    </tr>`;
  });

  html += "</table>";

  /* MATRIX */
  let map = {};

  orderedPlayers.forEach(r => {
    orderedPlayers.forEach(p => {
      map[`${r}->${p}`] = "";
    });
  });

  transfers.forEach(t => {
    map[`${t.from}->${t.to}`] = t.amount;
  });

  html += `<h3>💸 轉帳明細</h3><table><tr><th></th>`;

  orderedPlayers.forEach(p => html += `<th>${p}</th>`);
  html += "</tr>";

  orderedPlayers.forEach(r => {
    html += `<tr><th>${r}</th>`;
    orderedPlayers.forEach(p => {
      html += `<td>${map[`${r}->${p}`] || ""}</td>`;
    });
    html += "</tr>";
  });

  html += "</table>";

  document.getElementById("reportArea").innerHTML = html;
}

/* =========================
   RUN
========================= */
function run() {

  const ledger = buildLedger();

  const { spend, income, net } = computeNet(ledger);

  const transfers = buildTransfers(net);

  render(spend, income, net, transfers);
}

/* =========================
   IMAGE EXPORT
========================= */
function exportImage() {

  const target = document.querySelector("#reportArea table:last-child");

  html2canvas(target, {
    backgroundColor:"#fff",
    scale:2
  }).then(canvas => {

    let a = document.createElement("a");
    a.href = canvas.toDataURL("image/png");
    a.download = "boss_matrix.png";
    a.click();
  });
}

</script>

</body>
</html>
