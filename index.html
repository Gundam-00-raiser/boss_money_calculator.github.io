<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>BOSS 分帳UI</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>
body {
  font-family: Arial;
  background:#121212;
  color:#fff;
  padding:20px;
}

h2,h3 { margin-top:20px; }

textarea, input, select, button {
  padding:6px;
  margin:4px;
}

table {
  width:100%;
  border-collapse: collapse;
  margin-top:10px;
  background:#1f1f1f;
}

th, td {
  border:1px solid #444;
  padding:6px;
  text-align:center;
}

th { background:#2a2a2a; }

button { cursor:pointer; }

/* =========================
   🔻 結算報表縮小 2~3倍
========================= */
#reportArea table {
  background:white;
  color:black;
  font-size:12px;
}

#reportArea th,
#reportArea td {
  padding:3px;
  font-size:11px;
}
</style>
</head>

<body>

<h2>🔥 BOSS 分帳系統</h2>

<!-- ===================== -->
<!-- 玩家 -->
<!-- ===================== -->
<h3>👥 玩家名單</h3>

<textarea id="playerPool" rows="6" placeholder="A&#10;B&#10;C&#10;D"></textarea>

<button onclick="updatePlayers()">更新玩家名單</button>

<!-- ===================== -->
<!-- 競標 -->
<!-- ===================== -->
<h3>📦 競標資料</h3>

<table>
<thead>
<tr>
  <th>物品</th>
  <th>得標者</th>
  <th>金額</th>
  <th>操作</th>
</tr>
</thead>
<tbody id="tableBody"></tbody>
</table>

<button onclick="addRow()">➕ 新增</button>
<button onclick="calculate()">🧮 計算</button>
<button onclick="exportImage()">📸 產生圖片</button>

<hr>

<!-- ===================== -->
<!-- 結果 -->
<!-- ===================== -->
<div id="reportArea"></div>

<script>

let players = [];

// =====================
// 更新玩家
// =====================
function updatePlayers() {
  players = document.getElementById("playerPool")
    .value.split("\n")
    .map(x => x.trim())
    .filter(x => x);

  refreshDropdowns();
}

// =====================
// 更新下拉
// =====================
function refreshDropdowns() {
  document.querySelectorAll(".playerSelect").forEach(sel => {

    const current = sel.value;

    sel.innerHTML = players.map(p =>
      `<option value="${p}">${p}</option>`
    ).join("");

    if (players.includes(current)) sel.value = current;
  });
}

// =====================
// 新增列
// =====================
function addRow() {
  const tbody = document.getElementById("tableBody");

  const row = document.createElement("tr");

  row.innerHTML = `
    <td><input></td>

    <td>
      <select class="playerSelect">
        ${players.map(p => `<option value="${p}">${p}</option>`).join("")}
      </select>
    </td>

    <td><input type="number"></td>

    <td><button onclick="this.parentElement.parentElement.remove()">刪除</button></td>
  `;

  tbody.appendChild(row);
}

addRow();

// =====================
// 計算核心
// =====================
function calculate() {

  if (players.length < 2) {
    alert("至少需要2位玩家");
    return;
  }

  let data = [];

  document.querySelectorAll("#tableBody tr").forEach(row => {

    const item = row.children[0].querySelector("input").value;
    const winner = row.children[1].querySelector("select").value;
    const amount = Number(row.children[2].querySelector("input").value);

    if (item && winner && !isNaN(amount)) {
      data.push([item, winner, amount]);
    }
  });

  if (data.length === 0) {
    alert("沒有有效資料");
    return;
  }

  // =====================
  // 收支計算
  // =====================
  let spend = {}, income = {};

  players.forEach(p => {
    spend[p] = 0;
    income[p] = 0;
  });

  data.forEach(r => {
    spend[r[1]] += r[2];
  });

  const divisor = players.length - 1;

  data.forEach(r => {
    const share = Math.floor(r[2] / divisor);
    const remainder = r[2] - share * divisor;

    players.forEach(p => {
      if (p !== r[1]) income[p] += share;
    });

    income[r[1]] += remainder;
  });

  // =====================
  // 轉帳計算
  // =====================
  let balances = {};
  players.forEach(p => {
    balances[p] = income[p] - spend[p];
  });

  let creditors = players.filter(p => balances[p] > 0);
  let debtors = players.filter(p => balances[p] < 0);

  let transfers = [];

  while (creditors.length && debtors.length) {

    let c = creditors[0];
    let d = debtors[0];

    let pay = Math.min(balances[c], -balances[d]);

    transfers.push({
      from: d,
      to: c,
      amount: pay
    });

    balances[c] -= pay;
    balances[d] += pay;

    if (balances[c] === 0) creditors.shift();
    if (balances[d] === 0) debtors.shift();
  }

  // =====================
  // 報表 + 矩陣輸出
  // =====================
  let html = buildSummary(players, spend, income);

  html += buildMatrix(transfers);

  document.getElementById("reportArea").innerHTML = html;
}

// =====================
// 縮小版報表
// =====================
function buildSummary(players, spend, income) {

  let html = `
    <h3>📊 結算報表</h3>
    <table>
      <tr>
        <th>玩家</th>
        <th>支出</th>
        <th>收入</th>
        <th>淨值</th>
      </tr>
  `;

  players.forEach(p => {
    const net = income[p] - spend[p];
    html += `
      <tr>
        <td>${p}</td>
        <td>${spend[p]}</td>
        <td>${income[p]}</td>
        <td>${net}</td>
      </tr>
    `;
  });

  html += `</table>`;
  return html;
}

// =====================
// 🔥 矩陣（你要的核心）
// =====================
function buildMatrix(transfers) {

  let payersSet = new Set();
  let receiversSet = new Set();

  transfers.forEach(t => {
    payersSet.add(t.from);
    receiversSet.add(t.to);
  });

  let payers = [...payersSet];
  let receivers = [...receiversSet];

  let matrix = {};

  receivers.forEach(r => {
    matrix[r] = {};
    payers.forEach(p => matrix[r][p] = "");
  });

  transfers.forEach(t => {
    matrix[t.to][t.from] = t.amount;
  });

  let html = `
    <h3>💸 轉帳矩陣（最終）</h3>
    <table>
      <tr>
        <th>收款人 / 付款人</th>
        ${payers.map(p => `<th>${p}</th>`).join("")}
      </tr>
  `;

  receivers.forEach(r => {
    html += `<tr><th>${r}</th>`;

    payers.forEach(p => {
      html += `<td>${matrix[r][p] || ""}</td>`;
    });

    html += `</tr>`;
  });

  html += `</table>`;

  return html;
}

// =====================
// 📸 圖片（只抓矩陣）
// =====================
function exportImage() {

  const tables = document.querySelectorAll("#reportArea table");

  if (tables.length === 0) {
    alert("沒有可輸出的矩陣");
    return;
  }

  const target = tables[tables.length - 1];

  html2canvas(target, {
    backgroundColor: "#ffffff",
    scale: 2
  }).then(canvas => {
    const link = document.createElement("a");
    link.download = "boss-matrix.png";
    link.href = canvas.toDataURL("image/png");
    link.click();
  });
}

</script>

</body>
</html>
