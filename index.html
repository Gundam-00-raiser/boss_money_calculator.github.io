<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>BOSS 分帳 GitHub版（GAS移植）</title>

<style>
body{
  font-family: Arial;
  background:#111;
  color:#fff;
  padding:20px;
}

textarea,input,button{
  padding:6px;
  margin:4px;
}

table{
  border-collapse:collapse;
  margin-top:10px;
  background:#1e1e1e;
}

th,td{
  border:1px solid #444;
  padding:6px;
  text-align:center;
}

th{
  background:#2a2a2a;
}

select{padding:4px;}
</style>
</head>

<body>

<h2>🏦 BOSS 分帳（GitHub GAS移植版）</h2>

<h3>👥 玩家名單</h3>
<textarea id="players" rows="5"></textarea><br>
<button onclick="setPlayers()">更新玩家</button>

<h3>📦 結標</h3>

<table>
<thead>
<tr>
<th>物品</th>
<th>得標者</th>
<th>金額</th>
<th></th>
</tr>
</thead>
<tbody id="rows"></tbody>
</table>

<button onclick="addRow()">新增列</button>
<button onclick="calc()">計算</button>

<div id="out"></div>

<script>

let P = [];

/* =========================
   玩家更新
========================= */
function setPlayers(){
  P = document.getElementById("players")
    .value.split("\n")
    .map(x => x.trim())
    .filter(x => x);

  refreshSelects();
}

/* =========================
   dropdown 同步
========================= */
function refreshSelects(){
  document.querySelectorAll(".winner").forEach(sel=>{
    let cur = sel.value;

    sel.innerHTML = P.map(p=>`<option value="${p}">${p}</option>`).join("");

    if(P.includes(cur)){
      sel.value = cur;
    }
  });
}

/* =========================
   新增列
========================= */
function addRow(){

  let tr = document.createElement("tr");

  tr.innerHTML = `
    <td><input></td>
    <td>
      <select class="winner">
        ${P.map(p=>`<option value="${p}">${p}</option>`).join("")}
      </select>
    </td>
    <td><input type="number"></td>
    <td><button onclick="this.parentElement.parentElement.remove()">X</button></td>
  `;

  document.getElementById("rows").appendChild(tr);
}

/* =========================
   讀取結標資料
========================= */
function getData(){

  let data = [];

  document.querySelectorAll("#rows tr").forEach(r=>{
    let item = r.children[0].querySelector("input").value;
    let winner = r.children[1].querySelector("select").value;
    let amount = Number(r.children[2].querySelector("input").value);

    if(item && winner && amount){
      data.push({item, winner, amount});
    }
  });

  return data;
}

/* =========================
   GAS 核心移植（完全保留）
========================= */
function calcSettlement(data){

  let spend = {};
  let income = {};

  P.forEach(p=>{
    spend[p] = 0;
    income[p] = 0;
  });

  data.forEach(d=>{

    let n = P.length - 1;
    let share = d.amount / n;

    // winner 支出
    spend[d.winner] += d.amount;

    // 其他人均分收入
    P.forEach(p=>{
      if(p !== d.winner){
        income[p] += share;
      }
    });
  });

  let net = {};
  P.forEach(p=>{
    net[p] = income[p] - spend[p];
  });

  return net;
}

/* =========================
   轉帳矩陣（GAS同邏輯）
========================= */
function buildMatrix(net){

  let creditors = [];
  let debtors = [];

  P.forEach(p=>{
    if(net[p] > 0) creditors.push({p,amt:net[p]});
    if(net[p] < 0) debtors.push({p,amt:-net[p]});
  });

  let res = [];

  let i = 0, j = 0;

  while(i < creditors.length && j < debtors.length){

    let c = creditors[i];
    let d = debtors[j];

    let pay = Math.min(c.amt, d.amt);

    res.push({
      from: d.p,
      to: c.p,
      amount: Number(pay.toFixed(2))
    });

    c.amt -= pay;
    d.amt -= pay;

    if(c.amt === 0) i++;
    if(d.amt === 0) j++;
  }

  return res;
}

/* =========================
   render
========================= */
function render(net, matrix){

  let html = "<h3>📊 Net</h3><table>";
  html += "<tr><th>玩家</th><th>淨值</th></tr>";

  P.forEach(p=>{
    html += `<tr><td>${p}</td><td>${net[p].toFixed(2)}</td></tr>`;
  });

  html += "</table>";

  html += "<h3>💸 轉帳矩陣</h3><table>";
  html += "<tr><th>From</th><th>To</th><th>Amount</th></tr>";

  matrix.forEach(m=>{
    html += `<tr><td>${m.from}</td><td>${m.to}</td><td>${m.amount}</td></tr>`;
  });

  html += "</table>";

  document.getElementById("out").innerHTML = html;
}

/* =========================
   main
========================= */
function calc(){
  let data = getData();

  let net = calcSettlement(data);   // ← 完全 GAS 邏輯
  let matrix = buildMatrix(net);    // ← GAS matrix

  render(net, matrix);
}

</script>

</body>
</html>
