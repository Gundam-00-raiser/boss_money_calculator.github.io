<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>分帳系統（順序付款版）</title>

<style>
body{
  font-family: Arial;
  background:#111;
  color:#fff;
  padding:20px;
}

textarea,input,button{
  padding:6px;
  margin:4px;
}

table{
  border-collapse:collapse;
  margin-top:10px;
  background:#1e1e1e;
  width:100%;
}

th,td{
  border:1px solid #444;
  padding:6px;
  text-align:center;
}

th{
  background:#2a2a2a;
}

select{
  padding:4px;
}
</style>
</head>

<body>

<h2>🏦 分帳系統（A→B→C 順序付款版）</h2>

<h3>👥 玩家</h3>
<textarea id="players" rows="5"></textarea><br>
<button onclick="setPlayers()">更新玩家</button>

<h3>📦 結標</h3>

<table>
<thead>
<tr>
<th>物品</th>
<th>得標者</th>
<th>金額</th>
</tr>
</thead>
<tbody id="rows"></tbody>
</table>

<button onclick="addRow()">新增列</button>
<button onclick="calc()">計算</button>

<div id="out"></div>

<script>

let P = [];

/* =====================
   玩家更新
===================== */
function setPlayers(){
  P = document.getElementById("players")
    .value.split("\n")
    .map(x=>x.trim())
    .filter(x=>x);
}

/* =====================
   新增列
===================== */
function addRow(){

  let tr = document.createElement("tr");

  tr.innerHTML = `
    <td><input></td>
    <td>
      <select>
        ${P.map(p=>`<option value="${p}">${p}</option>`).join("")}
      </select>
    </td>
    <td><input type="number"></td>
  `;

  document.getElementById("rows").appendChild(tr);
}

/* =====================
   讀資料
===================== */
function getData(){

  let d=[];

  document.querySelectorAll("#rows tr").forEach(r=>{
    let item = r.children[0].querySelector("input").value;
    let w = r.children[1].querySelector("select").value;
    let a = Number(r.children[2].querySelector("input").value);

    if(item && w && a){
      d.push({winner:w, amount:a});
    }
  });

  return d;
}

/* =====================
   GAS net 核心（不動）
===================== */
function calcNet(data){

  let income={}, spend={};

  P.forEach(p=>{
    income[p]=0;
    spend[p]=0;
  });

  data.forEach(d=>{
    let n = P.length - 1;
    let share = d.amount / n;

    spend[d.winner] += d.amount;

    P.forEach(p=>{
      if(p !== d.winner){
        income[p] += share;
      }
    });
  });

  let net={};

  P.forEach(p=>{
    net[p] = income[p] - spend[p];
  });

  return net;
}

/* =====================
   🔥 順序付款核心（你要的版本）
===================== */
function buildMatrix(net){

  const MIN = 50;

  let creditors = [];
  let debtors = [];

  P.forEach((p, idx)=>{
    let v = Math.round(net[p] * 100) / 100;

    if(v > 0) creditors.push({p, amt:v});
    if(v < 0) debtors.push({p, amt:-v, idx});
  });

  // 收款人：大額優先
  creditors.sort((a,b)=>b.amt-a.amt);

  // 付款人：A→B→C 順序
  debtors.sort((a,b)=>P.indexOf(a.p)-P.indexOf(b.p));

  let res = [];

  let ci = 0;
  let di = 0;

  while(ci < creditors.length && di < debtors.length){

    let c = creditors[ci];
    let d = debtors[di];

    let pay = Math.min(c.amt, d.amt);

    if(pay <= 0){
      di++;
      continue;
    }

    // 🔥 小額限制（避免碎帳）
    let hasMore = (ci < creditors.length - 1 || di < debtors.length - 1);

    if(pay < MIN && hasMore){
      di++;
      continue;
    }

    res.push({
      from: d.p,
      to: c.p,
      amount: Math.round(pay * 100) / 100
    });

    c.amt -= pay;
    d.amt -= pay;

    if(c.amt < 0.01) ci++;
    if(d.amt < 0.01) di++;
  }

  return res;
}

/* =====================
   render
===================== */
function render(net, res){

  let html = "<h3>📊 Net</h3><table>";
  html += "<tr><th>玩家</th><th>淨值</th></tr>";

  P.forEach(p=>{
    html += `<tr><td>${p}</td><td>${net[p].toFixed(2)}</td></tr>`;
  });

  html += "</table>";

  html += "<h3>💸 轉帳明細（順序付款版）</h3><table>";
  html += "<tr><th>From</th><th>To</th><th>Amount</th></tr>";

  res.forEach(r=>{
    html += `<tr><td>${r.from}</td><td>${r.to}</td><td>${r.amount}</td></tr>`;
  });

  html += "</table>";

  document.getElementById("out").innerHTML = html;
}

/* =====================
   main
===================== */
function calc(){
  let data = getData();
  let net = calcNet(data);
  let res = buildMatrix(net);
  render(net, res);
}

</script>

</body>
</html>
