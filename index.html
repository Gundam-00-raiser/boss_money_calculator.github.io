<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>BOSS 分帳系統 FINAL</title>

<style>
body{
  font-family: Arial;
  background:#111;
  color:#fff;
  padding:20px;
}

textarea,input,button{
  padding:6px;
  margin:5px;
}

table{
  width:100%;
  border-collapse:collapse;
  margin-top:10px;
}

th,td{
  border:1px solid #444;
  padding:6px;
  text-align:center;
}

th{background:#222;}
</style>
</head>

<body>

<h2>🔥 BOSS 分帳 FINAL 系統</h2>

<h3>👥 玩家（每行一個）</h3>
<textarea id="players" rows="6"></textarea>

<h3>📦 結標資料</h3>

<table id="bidTable">
<tr>
<th>物品</th>
<th>得標者</th>
<th>金額</th>
<th></th>
</tr>
</table>

<button onclick="addRow()">➕ 新增</button>
<button onclick="calc()">🚀 計算</button>

<div id="out"></div>

<script>

let P = [];

function updatePlayers(){
  P = document.getElementById("players")
    .value.split("\n")
    .map(x=>x.trim())
    .filter(x=>x);
}

function addRow(){
  updatePlayers();

  let tr = document.createElement("tr");

  let options = P.map(p=>`<option>${p}</option>`).join("");

  tr.innerHTML = `
    <td><input></td>
    <td><select>${options}</select></td>
    <td><input type="number"></td>
    <td><button onclick="this.parentNode.parentNode.remove()">X</button></td>
  `;

  document.getElementById("bidTable").appendChild(tr);
}

function getData(){

  let rows = document.querySelectorAll("#bidTable tr");
  let data = [];

  for(let i=1;i<rows.length;i++){

    let r = rows[i];

    let item = r.children[0].querySelector("input").value;
    let winner = r.children[1].querySelector("select").value;
    let amount = Number(r.children[2].querySelector("input").value);

    if(item && winner && amount){
      data.push({item,winner,amount});
    }
  }

  return data;
}

// ==========================
// 🔥 CORE ENGINE（正確版）
// ==========================
function calc(){

  updatePlayers();

  let data = getData();

  let income = {};
  let spend = {};

  P.forEach(p=>{
    income[p]=0;
    spend[p]=0;
  });

  // ======================
  // 1. 正確分配（N-1）
  // ======================
  data.forEach(d=>{

    let n = P.length - 1;
    let share = d.amount / n;

    spend[d.winner] += d.amount;

    P.forEach(p=>{
      if(p !== d.winner){
        income[p] += share;
      }
    });

  });

  // ======================
  // 2. net
  // ======================
  let net = {};

  P.forEach(p=>{
    net[p] = income[p] - spend[p];
  });

  // ======================
  // 3. 分類
  // ======================
  let creditors = [];
  let debtors = [];

  P.forEach(p=>{
    let v = net[p];
    if(v > 0) creditors.push({p,amt:v});
    if(v < 0) debtors.push({p,amt:-v});
  });

  // ======================
  // 4. SORT（穩定）
  // ======================
  creditors.sort((a,b)=>b.amt-a.amt);
  debtors.sort((a,b)=>b.amt-a.amt);

  // ======================
  // 5. sequential settlement
  // ======================
  let i=0,j=0;
  let transfers=[];

  while(i<creditors.length && j<debtors.length){

    let c = creditors[i];
    let d = debtors[j];

    let pay = Math.min(c.amt, d.amt);

    transfers.push({
      from: d.p,
      to: c.p,
      amount: Math.round(pay)
    });

    c.amt -= pay;
    d.amt -= pay;

    if(c.amt <= 0.0001) i++;
    if(d.amt <= 0.0001) j++;
  }

  render(net, transfers);
}

// ======================
// render
// ======================
function render(net, transfers){

  let html = "<h3>📊 NET</h3><table>";
  html += "<tr><th>人</th><th>net</th></tr>";

  P.forEach(p=>{
    html += `<tr><td>${p}</td><td>${net[p].toFixed(2)}</td></tr>`;
  });

  html += "</table>";

  html += "<h3>💸 轉帳矩陣</h3><table>";
  html += "<tr><th>From</th><th>To</th><th>Amount</th></tr>";

  transfers.forEach(t=>{
    html += `<tr><td>${t.from}</td><td>${t.to}</td><td>${t.amount}</td></tr>`;
  });

  html += "</table>";

  document.getElementById("out").innerHTML = html;
}

</script>

</body>
</html>
