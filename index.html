<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>BOSS v15 穩定清算版</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>
body {
  font-family: Arial;
  background:#121212;
  color:#fff;
  padding:20px;
}

textarea, input, select, button {
  padding:6px;
  margin:4px;
}

table {
  border-collapse: collapse;
  margin-top:10px;
  background:#1f1f1f;
}

th, td {
  border:1px solid #444;
  padding:6px;
  text-align:center;
  min-width:80px;
}

#reportArea {
  display:flex;
  flex-direction:column;
  align-items:flex-start;
  gap:20px;
  max-width:1200px;
}

#reportArea table {
  background:white;
  color:black;
  font-size:12px;
  width:max-content;
}

#reportArea th {
  background:#666;
  color:#111;
}

#reportArea td {
  background:#f4f4f4;
}
</style>
</head>

<body>

<h2>🏦 BOSS v15（穩定銀行級清算）</h2>

<textarea id="playerPool" rows="5" placeholder="A&#10;B&#10;C"></textarea>
<button onclick="setPlayers()">更新玩家</button>

<table>
<tbody id="rows"></tbody>
</table>

<button onclick="addRow()">新增列</button>
<button onclick="run()">計算</button>
<button onclick="exportImage()">輸出圖片</button>

<hr>

<div id="reportArea"></div>

<script>

let players = [];
let orderedPlayers = [];

/* =========================
   玩家
========================= */
function setPlayers() {

  players = document.getElementById("playerPool")
    .value.split("\n")
    .map(x => x.trim())
    .filter(x => x);

  orderedPlayers = [...players];

  refreshSelects();
}

/* =========================
   dropdown
========================= */
function refreshSelects() {

  document.querySelectorAll("#rows tr select").forEach(sel => {

    const old = sel.value;

    sel.innerHTML = `
      <option value="">選擇得標者</option>
      ${orderedPlayers.map(p => `<option value="${p}">${p}</option>`).join("")}
    `;

    sel.value = orderedPlayers.includes(old) ? old : "";
  });
}

/* =========================
   row
========================= */
function addRow() {

  const tr = document.createElement("tr");

  tr.innerHTML = `
    <td><input placeholder="物品"></td>
    <td>
      <select>
        <option value="">選擇得標者</option>
        ${orderedPlayers.map(p => `<option value="${p}">${p}</option>`).join("")}
      </select>
    </td>
    <td><input type="number" placeholder="金額"></td>
    <td><button onclick="this.parentElement.parentElement.remove()">X</button></td>
  `;

  document.getElementById("rows").appendChild(tr);
}

addRow();

/* =========================
   ledger
========================= */
function buildLedger() {

  let data = [];

  document.querySelectorAll("#rows tr").forEach(r => {

    const item = r.children[0].querySelector("input").value;
    const winner = r.children[1].querySelector("select").value;
    const amount = Number(r.children[2].querySelector("input").value);

    if (item && winner && amount) {
      data.push({ item, winner, amount });
    }
  });

  return data;
}

/* =========================
   NET（正確模型）
========================= */
function computeNet(ledger) {

  let spend = {};
  orderedPlayers.forEach(p => spend[p] = 0);

  ledger.forEach(l => {
    spend[l.winner] += l.amount;
  });

  const total = ledger.reduce((s, l) => s + l.amount, 0);
  const n = orderedPlayers.length;

  const fairShare = total / n;

  let net = {};

  orderedPlayers.forEach(p => {
    net[p] = +(fairShare - spend[p]).toFixed(2);
  });

  return { spend, net };
}

/* =========================
   🔥 transfer engine（修正碎帳）
========================= */
function buildTransfers(net) {

  let creditors = [];
  let debtors = [];

  orderedPlayers.forEach(p => {
    if (net[p] > 0.01) creditors.push({ p, v: net[p] });
    if (net[p] < -0.01) debtors.push({ p, v: -net[p] });
  });

  creditors.sort((a,b)=>b.v-a.v);
  debtors.sort((a,b)=>b.v-a.v);

  let transfers = [];

  while (creditors.length && debtors.length) {

    let c = creditors[0];
    let d = debtors[0];

    let amount = Math.min(c.v, d.v);

    // ❗ 避免碎帳
    if (amount < 50) {
      break;
    }

    // ❗ 防 self transfer
    if (c.p === d.p) {
      creditors.shift();
      continue;
    }

    transfers.push({
      from: d.p,
      to: c.p,
      amount: Math.round(amount)
    });

    c.v -= amount;
    d.v -= amount;

    if (c.v <= 0.01) creditors.shift();
    if (d.v <= 0.01) debtors.shift();
  }

  return mergeTransfers(transfers);
}

/* =========================
   merge（避免碎帳）
========================= */
function mergeTransfers(list) {

  let map = {};

  list.forEach(t => {
    let key = `${t.from}->${t.to}`;
    map[key] = (map[key] || 0) + t.amount;
  });

  return Object.entries(map).map(([k,v]) => {

    let [from,to] = k.split("->");

    return { from, to, amount: Math.round(v) };
  });
}

/* =========================
   render
========================= */
function render(spend, net, transfers) {

  let html = `<h3>📊 結算</h3><table>
  <tr><th>玩家</th><th>支出</th><th>淨值</th></tr>`;

  orderedPlayers.forEach(p => {
    html += `<tr>
      <td>${p}</td>
      <td>${spend[p]}</td>
      <td>${net[p]}</td>
    </tr>`;
  });

  html += "</table>";

  let active = orderedPlayers.filter(p => Math.abs(net[p]) > 0.01);

  let map = {};

  active.forEach(r => {
    active.forEach(p => {
      map[`${r}->${p}`] = "";
    });
  });

  transfers.forEach(t => {
    map[`${t.from}->${t.to}`] = t.amount;
  });

  html += `<h3>💸 轉帳矩陣</h3><table><tr><th></th>`;

  active.forEach(p => html += `<th>${p}</th>`);
  html += "</tr>";

  active.forEach(r => {
    html += `<tr><th>${r}</th>`;
    active.forEach(p => {
      html += `<td>${map[`${r}->${p}`] || ""}</td>`;
    });
    html += "</tr>";
  });

  html += "</table>";

  document.getElementById("reportArea").innerHTML = html;
}

/* =========================
   run
========================= */
function run() {

  const ledger = buildLedger();

  const { spend, net } = computeNet(ledger);

  const transfers = buildTransfers(net);

  render(spend, net, transfers);
}

/* =========================
   export
========================= */
function exportImage() {

  const target = document.querySelector("#reportArea table:last-child");

  html2canvas(target, {
    backgroundColor:"#fff",
    scale:2
  }).then(canvas => {

    let a = document.createElement("a");
    a.href = canvas.toDataURL("image/png");
    a.download = "boss_v15.png";
    a.click();
  });
}

</script>

</body>
</html>
