<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>BOSS 分帳系統</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>
  body {
    font-family: Arial;
    background:#1e1e1e;
    color:#fff;
    padding:20px;
  }

  input, select, button {
    padding:6px;
    margin:4px;
  }

  table {
    border-collapse: collapse;
    width: 100%;
    margin-top:10px;
    background:#2a2a2a;
  }

  th, td {
    border:1px solid #555;
    padding:8px;
    text-align:center;
  }

  th {
    background:#333;
  }

  button {
    cursor:pointer;
  }

  #reportArea table {
    background:white;
    color:black;
  }
</style>
</head>

<body>

<h2>🔥 BOSS 分帳系統（網頁版）</h2>

<!-- 玩家 -->
<h3>👥 玩家（逗號分隔）</h3>
<input id="playersInput" placeholder="A,B,C,D" oninput="updatePlayers()">

<!-- 表格 -->
<h3>📦 競標表</h3>

<table id="bidTable">
  <thead>
    <tr>
      <th>物品</th>
      <th>得標者</th>
      <th>金額</th>
      <th>操作</th>
    </tr>
  </thead>
  <tbody id="tableBody"></tbody>
</table>

<button onclick="addRow()">➕ 新增列</button>
<button onclick="calculate()">🧮 計算</button>
<button onclick="exportImage()">📸 產生圖片</button>

<hr>

<!-- 結果 -->
<div id="reportArea"></div>

<script>
let players = [];

function updatePlayers() {
  players = document.getElementById("playersInput")
    .value.split(",")
    .map(x => x.trim())
    .filter(x => x);

  renderTable();
}

function renderTable() {
  const tbody = document.getElementById("tableBody");
  tbody.innerHTML = "";
  addRow();
}

function addRow() {
  const tbody = document.getElementById("tableBody");

  const row = document.createElement("tr");

  row.innerHTML = `
    <td><input></td>
    <td>
      <select>
        ${players.map(p => `<option value="${p}">${p}</option>`).join("")}
      </select>
    </td>
    <td><input type="number"></td>
    <td><button onclick="this.parentElement.parentElement.remove()">刪除</button></td>
  `;

  tbody.appendChild(row);
}

// =====================
// 計算核心（你的邏輯）
// =====================
function calculate() {

  if (players.length < 2) {
    alert("至少需要 2 位玩家");
    return;
  }

  let data = [];

  document.querySelectorAll("#tableBody tr").forEach(row => {
    const item = row.children[0].querySelector("input").value;
    const winner = row.children[1].querySelector("select").value;
    const amount = Number(row.children[2].querySelector("input").value);

    if (item && winner && amount) {
      data.push([item, winner, amount]);
    }
  });

  let spend = {}, income = {};
  players.forEach(p => {
    spend[p] = 0;
    income[p] = 0;
  });

  // 支出
  data.forEach(r => {
    spend[r[1]] += r[2];
  });

  // 收入
  data.forEach(r => {
    const share = Math.floor(r[2] / (players.length - 1));
    const remainder = r[2] - share * (players.length - 1);

    players.forEach(p => {
      if (p !== r[1]) income[p] += share;
    });

    income[r[1]] += remainder;
  });

  let html = `
  <h3 id="captureArea">📊 結算報表</h3>
  <table>
    <tr>
      <th>玩家</th>
      <th>支出</th>
      <th>收入</th>
      <th>淨值</th>
    </tr>
  `;

  players.forEach(p => {
    const net = income[p] - spend[p];
    html += `
      <tr>
        <td>${p}</td>
        <td>${spend[p]}</td>
        <td>${income[p]}</td>
        <td>${net}</td>
      </tr>
    `;
  });

  html += "</table>";

  // 轉帳
  let balances = {};
  players.forEach(p => balances[p] = income[p] - spend[p]);

  let creditors = players.filter(p => balances[p] > 0);
  let debtors = players.filter(p => balances[p] < 0);

  let transfers = [];

  while (creditors.length && debtors.length) {
    let c = creditors[0];
    let d = debtors[0];

    let pay = Math.min(balances[c], -balances[d]);

    if (pay < 50) {
      if (!(creditors.length === 1 && debtors.length === 1)) {
        debtors.push(debtors.shift());
        continue;
      }
    }

    transfers.push({from:d,to:c,amount:pay});

    balances[c] -= pay;
    balances[d] += pay;

    if (balances[c] === 0) creditors.shift();
    if (balances[d] === 0) debtors.shift();
  }

  html += "<h3>💸 轉帳明細</h3><ul>";
  transfers.forEach(t => {
    html += `<li>${t.from} → ${t.to} ${t.amount}</li>`;
  });
  html += "</ul>";

  document.getElementById("reportArea").innerHTML = html;
}

// =====================
// 📸 產圖功能
// =====================
function exportImage() {
  const target = document.getElementById("reportArea");

  html2canvas(target, {
    backgroundColor: "#ffffff"
  }).then(canvas => {
    const link = document.createElement("a");
    link.download = "boss-report.png";
    link.href = canvas.toDataURL("image/png");
    link.click();
  });
}

// 初始化
renderTable();
</script>

</body>
</html>
