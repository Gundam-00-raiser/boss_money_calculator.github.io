<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>BOSS 分帳明細v24</title>

<style>
body{
  font-family:Arial;
  background:#111;
  color:#fff;
  padding:20px;
}

textarea,input,button,select{
  padding:6px;
  margin:4px;
}

table{
  border-collapse:collapse;
  margin-top:10px;
  background:#1e1e1e;
}

th,td{
  border:1px solid #444;
  padding:6px;
  text-align:center;
  min-width:70px;
}

th{
  background:#2a2a2a;
}
</style>
</head>

<body>

<h2>🏦 BOSS 分帳明細v24</h2>

<h3>👥 玩家</h3>
<textarea id="playersInput" rows="5"></textarea><br>
<button onclick="updatePlayers()">更新玩家</button>

<h3>📦 結標</h3>

<table>
<thead>
<tr><th>物品</th><th>得標者</th><th>金額</th><th></th></tr>
</thead>
<tbody id="rows"></tbody>
</table>

<button onclick="addRow()">新增</button>
<button onclick="calc()">計算</button>

<div id="report"></div>

<script>

let players=[];

function updatePlayers(){
  players=document.getElementById("playersInput")
    .value.split("\n")
    .map(x=>x.trim())
    .filter(x=>x);
  refresh();
}

function refresh(){
  document.querySelectorAll(".winner").forEach(sel=>{
    let v=sel.value;
    sel.innerHTML=players.map(p=>`<option>${p}</option>`).join("");
    sel.value=v;
  });
}

function addRow(){
  let tr=document.createElement("tr");
  tr.innerHTML=`
    <td><input></td>
    <td><select class="winner">${players.map(p=>`<option>${p}</option>`).join("")}</select></td>
    <td><input type="number"></td>
    <td><button onclick="this.parentElement.parentElement.remove()">X</button></td>
  `;
  document.getElementById("rows").appendChild(tr);
}
addRow();

function getData(){
  let data=[];
  document.querySelectorAll("#rows tr").forEach(r=>{
    let item=r.children[0].querySelector("input").value;
    let w=r.children[1].querySelector("select").value;
    let a=Number(r.children[2].querySelector("input").value);
    if(item&&w&&a) data.push({item,winner:w,amount:a});
  });
  return data;
}

/* =======================
   1. 收支計算（核心）
======================= */
function compute(data){

  let income={}, spend={};
  players.forEach(p=>{
    income[p]=0;
    spend[p]=0;
  });

  data.forEach(d=>{
    let n=players.length-1;
    let share=Math.floor(d.amount/n);
    let rem=d.amount-share*n;

    spend[d.winner]+=d.amount;

    players.forEach(p=>{
      if(p!==d.winner) income[p]+=share;
    });

    // residual 暫存（不合併）
    let targets=players.filter(p=>p!==d.winner);
    let i=0;
    while(rem>0){
      let add=Math.min(rem,50);
      income[targets[i%targets.length]]+=add;
      rem-=add;
      i++;
    }
  });

  let net={};
  players.forEach(p=>{
    net[p]=income[p]-spend[p];
  });

  return {income,spend,net};
}

/* =======================
   2. 轉帳矩陣（流水線 + 可追溯）
======================= */
function buildMatrix(net){

  let payers=players.filter(p=>net[p]<0);
  let receivers=players.filter(p=>net[p]>0);

  let payLeft={}, recLeft={};

  payers.forEach(p=>payLeft[p]=-net[p]);
  receivers.forEach(p=>recLeft[p]=net[p]);

  let matrix={};
  receivers.forEach(r=>{
    matrix[r]={};
    payers.forEach(p=>matrix[r][p]=[]);
  });

  receivers.forEach(r=>{

    let need=recLeft[r];

    for(let p of payers){

      if(need<=0) break;
      if(payLeft[p]<=0) continue;

      let pay=Math.min(payLeft[p],need);

      // 🔥 防碎帳
      if(pay<50 && need>50) continue;

      matrix[r][p].push(pay);

      payLeft[p]-=pay;
      need-=pay;
    }
  });

  return {matrix,payers,receivers};
}

/* =======================
   3. Render
======================= */
function render(res,m){

  let html=`<h3>📊 結算</h3><table>
  <tr><th>玩家</th><th>支出</th><th>收入</th><th>淨值</th></tr>`;

  players.forEach(p=>{
    html+=`<tr>
    <td>${p}</td>
    <td>${res.spend[p]}</td>
    <td>${res.income[p]}</td>
    <td>${res.net[p]}</td>
    </tr>`;
  });

  html+=`</table>`;

  html+=`<h3>💸 轉帳明細</h3><table><tr><th>收款人\\付款人</th>`;

  m.payers.forEach(p=>html+=`<th>${p}</th>`);
  html+=`</tr>`;

  m.receivers.forEach(r=>{
    html+=`<tr><th>${r}</th>`;
    m.payers.forEach(p=>{
      html+=`<td>${(m.matrix[r][p]||[]).join("<br>")}</td>`;
    });
    html+=`</tr>`;
  });

  html+=`</table>`;

  document.getElementById("report").innerHTML=html;
}

/* =======================
   4. 主流程
======================= */
function calc(){

  let data=getData();
  let res=compute(data);
  let m=buildMatrix(res.net);

  render(res,m);
}

</script>

</body>
</html>
