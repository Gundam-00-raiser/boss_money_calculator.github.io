<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>BOSS 分帳（GAS 1:1穩定版）</title>

<style>
body{
  font-family: Arial;
  background:#111;
  color:#fff;
  padding:20px;
}

textarea,input,button{
  padding:6px;
  margin:4px;
}

table{
  border-collapse:collapse;
  margin-top:10px;
  width:100%;
  background:#1e1e1e;
}

th,td{
  border:1px solid #444;
  padding:6px;
  text-align:center;
}

th{background:#2a2a2a;}

select{padding:4px;}
</style>
</head>

<body>

<h2>🏦 BOSS 分帳（GAS 1:1 穩定克隆版）</h2>

<textarea id="players" rows="5"></textarea><br>
<button onclick="setPlayers()">更新玩家</button>

<table>
<thead>
<tr>
<th>物品</th>
<th>得標者</th>
<th>金額</th>
</tr>
</thead>
<tbody id="rows"></tbody>
</table>

<button onclick="addRow()">新增</button>
<button onclick="calc()">計算</button>

<div id="out"></div>

<script>

let P = [];

/* =====================
   玩家
===================== */
function setPlayers(){
  P = document.getElementById("players")
    .value.split("\n")
    .map(x=>x.trim())
    .filter(x=>x);
}

/* =====================
   row
===================== */
function addRow(){

  let tr = document.createElement("tr");

  tr.innerHTML = `
    <td><input></td>
    <td>
      <select>
        ${P.map(p=>`<option value="${p}">${p}</option>`).join("")}
      </select>
    </td>
    <td><input type="number"></td>
  `;

  document.getElementById("rows").appendChild(tr);
}

/* =====================
   data
===================== */
function getData(){

  let d = [];

  document.querySelectorAll("#rows tr").forEach(r=>{
    let item = r.children[0].querySelector("input").value;
    let w = r.children[1].querySelector("select").value;
    let a = Number(r.children[2].querySelector("input").value);

    if(item && w && a){
      d.push({winner:w, amount:a});
    }
  });

  return d;
}

/* =====================
   GAS NET（完全一致）
===================== */
function calcNet(data){

  let income = {};
  let spend = {};

  P.forEach(p=>{
    income[p]=0;
    spend[p]=0;
  });

  data.forEach(d=>{
    let n = P.length - 1;
    let share = Math.floor(d.amount / n);

    let remainder = d.amount - share * n;

    spend[d.winner] += d.amount;

    P.forEach(p=>{
      if(p !== d.winner){
        income[p] += share;
      }
    });

    income[d.winner] += remainder;
  });

  let net = {};

  P.forEach(p=>{
    net[p] = income[p] - spend[p];
  });

  return net;
}

/* =====================
   🔥 FIXED TRANSFER ENGINE（關鍵修正）
===================== */
function buildTransfers(net){

  const EPS = 0.01;

  let creditors = [];
  let debtors = [];

  // 🔥 不過濾任何人（防止消失）
  P.forEach(p=>{
    let v = Math.round(net[p]*100)/100;

    if(v > EPS) creditors.push({p, amt:v});
    else if(v < -EPS) debtors.push({p, amt:-v});
  });

  creditors.sort((a,b)=>b.amt-a.amt);
  debtors.sort((a,b)=>b.amt-a.amt);

  let res = [];

  let i = 0;
  let j = 0;

  while(i < creditors.length && j < debtors.length){

    let c = creditors[i];
    let d = debtors[j];

    let pay = Math.min(c.amt, d.amt);

    if(pay < EPS){
      j++;
      continue;
    }

    res.push({
      from: d.p,
      to: c.p,
      amount: Math.round(pay*100)/100
    });

    c.amt -= pay;
    d.amt -= pay;

    if(c.amt < EPS) i++;
    if(d.amt < EPS) j++;
  }

  return res;
}

/* =====================
   render（純展示）
===================== */
function render(net, transfers){

  let html = "<h3>📊 NET</h3><table>";
  html += "<tr><th>玩家</th><th>淨值</th></tr>";

  P.forEach(p=>{
    html += `<tr><td>${p}</td><td>${net[p].toFixed(2)}</td></tr>`;
  });

  html += "</table>";

  html += "<h3>💸 轉帳矩陣（穩定版）</h3><table>";
  html += "<tr><th>From</th><th>To</th><th>Amount</th></tr>";

  transfers.forEach(t=>{
    html += `<tr><td>${t.from}</td><td>${t.to}</td><td>${t.amount}</td></tr>`;
  });

  html += "</table>";

  document.getElementById("out").innerHTML = html;
}

/* =====================
   main
===================== */
function calc(){

  let data = getData();

  let net = calcNet(data);

  let transfers = buildTransfers(net);

  render(net, transfers);
}

</script>

</body>
</html>
