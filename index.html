<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>破天分帳小助手</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>
body{
  font-family: Arial;
  background:#121212;
  color:#fff;
  padding:20px;
}

textarea,input,select,button{
  padding:6px;
  margin:4px;
}

table{
  border-collapse: collapse;
  width:100%;
  margin-top:10px;
  background:#1f1f1f;
}

th,td{
  border:1px solid #444;
  padding:8px;
  text-align:center;
}

th{
  background:#2a2a2a;
}

button{cursor:pointer}

#reportArea table{
  background:white;
  color:black;
}
</style>
</head>

<body>

<h2>🔥 破天BOSS分帳計算機 </h2>

<!-- 玩家池 -->
<h3>👥 玩家清單</h3>
<textarea id="playerPool" rows="5" placeholder="A&#10;B&#10;C&#10;D"></textarea>
<button onclick="updatePlayers()">更新玩家</button>

<hr>

<!-- 競標 -->
<h3>📦 競標資料</h3>

<table>
<thead>
<tr>
  <th>物品</th>
  <th>得標者</th>
  <th>金額</th>
  <th>操作</th>
</tr>
</thead>
<tbody id="tableBody"></tbody>
</table>

<button onclick="addRow()">➕ 新增結標物品/金額</button>
<button onclick="calculate()">🧮 結算</button>
<button onclick="exportImage()">📸 圖片生成</button>

<hr>

<div id="reportArea"></div>

<script>

let players = [];

// =====================
// 更新玩家
// =====================
function updatePlayers(){
  players = document.getElementById("playerPool")
    .value.split("\n")
    .map(x=>x.trim())
    .filter(x=>x);

  refreshDropdowns();
}

// =====================
// 更新所有下拉
// =====================
function refreshDropdowns(){
  document.querySelectorAll(".playerSelect").forEach(sel=>{
    const current = sel.value;

    sel.innerHTML = players.map(p=>
      `<option value="${p}">${p}</option>`
    ).join("");

    if(players.includes(current)) sel.value=current;
  });
}

// =====================
// 新增列
// =====================
function addRow(){
  const tbody = document.getElementById("tableBody");

  const row = document.createElement("tr");

  row.innerHTML=`
    <td><input></td>

    <td>
      <select class="playerSelect">
        ${players.map(p=>`<option value="${p}">${p}</option>`).join("")}
      </select>
    </td>

    <td><input type="number"></td>

    <td><button onclick="this.parentElement.parentElement.remove()">刪除</button></td>
  `;

  tbody.appendChild(row);
}

addRow();

// =====================
// 計算
// =====================
function calculate(){

  let data=[];

  document.querySelectorAll("#tableBody tr").forEach(row=>{
    const item=row.children[0].querySelector("input").value;
    const winner=row.children[1].querySelector("select").value;
    const amount=Number(row.children[2].querySelector("input").value);

    if(item && winner && amount){
      data.push([item,winner,amount]);
    }
  });

  let spend={}, income={};
  players.forEach(p=>{
    spend[p]=0;
    income[p]=0;
  });

  // 支出
  data.forEach(r=>{
    spend[r[1]]+=r[2];
  });

  // 收入
  data.forEach(r=>{
    const share=Math.floor(r[2]/(players.length-1));
    const remainder=r[2]-share*(players.length-1);

    players.forEach(p=>{
      if(p!==r[1]) income[p]+=share;
    });

    income[r[1]]+=remainder;
  });

  // =====================
  // 計算轉帳
  // =====================
  let balances={};
  players.forEach(p=>{
    balances[p]=income[p]-spend[p];
  });

  let creditors=players.filter(p=>balances[p]>0);
  let debtors=players.filter(p=>balances[p]<0);

  let transfers=[];

  while(creditors.length && debtors.length){

    let c=creditors[0];
    let d=debtors[0];

    let pay=Math.min(balances[c],-balances[d]);

    if(pay<50){
      if(!(creditors.length===1 && debtors.length===1)){
        debtors.push(debtors.shift());
        continue;
      }
    }

    transfers.push({from:d,to:c,amount:pay});

    balances[c]-=pay;
    balances[d]+=pay;

    if(balances[c]===0) creditors.shift();
    if(balances[d]===0) debtors.shift();
  }

  // =====================
  // 矩陣輸出（你要的重點）
  // =====================

  document.getElementById("reportArea").innerHTML = buildMatrix(transfers);
}

// =====================
// 矩陣報表（核心）
// =====================
function buildMatrix(transfers){

  // 付款人（只顯示有付款的）
  let payersSet=new Set();
  let receiversSet=new Set();

  transfers.forEach(t=>{
    payersSet.add(t.from);
    receiversSet.add(t.to);
  });

  let payers=[...payersSet];
  let receivers=[...receiversSet];

  let matrix={};

  receivers.forEach(r=>{
    matrix[r]={};
    payers.forEach(p=>matrix[r][p]="");
  });

  transfers.forEach(t=>{
    matrix[t.to][t.from]=t.amount;
  });

  let html=`
    <h3>💸 分帳矩陣</h3>
    <table>
      <tr>
        <th>收款人 / 付款人</th>
        ${payers.map(p=>`<th>${p}</th>`).join("")}
      </tr>
  `;

  receivers.forEach(r=>{
    html+=`<tr><th>${r}</th>`;

    payers.forEach(p=>{
      html+=`<td>${matrix[r][p]||""}</td>`;
    });

    html+=`</tr>`;
  });

  html+=`</table>`;

  return html;
}

// =====================
// 產圖
// =====================
function exportImage(){
  const target=document.getElementById("reportArea");

  html2canvas(target,{
    backgroundColor:"#ffffff",
    scale:2
  }).then(canvas=>{
    const link=document.createElement("a");
    link.download="boss-matrix.png";
    link.href=canvas.toDataURL("image/png");
    link.click();
  });
}

</script>

</body>
</html>
