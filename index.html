<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>分帳計算機 FINAL CLEAN</title>

<style>
body{
  font-family: Arial;
  background:#111;
  color:#fff;
  padding:20px;
}
textarea,input,button{
  padding:6px;
  margin:4px;
}
table{
  border-collapse:collapse;
  margin-top:10px;
  background:#1e1e1e;
}
th,td{
  border:1px solid #444;
  padding:6px;
  text-align:center;
}
th{background:#2a2a2a;}
</style>
</head>

<body>

<h2>🧮 FINAL 分帳計算機（穩定版）</h2>

<h3>👥 玩家</h3>
<textarea id="players" rows="5"></textarea><br>
<button onclick="setPlayers()">更新玩家</button>

<h3>📦 結標</h3>

<table>
<thead>
<tr>
<th>物品</th>
<th>得標者</th>
<th>金額</th>
<th></th>
</tr>
</thead>
<tbody id="rows"></tbody>
</table>

<button onclick="addRow()">新增</button>
<button onclick="calc()">計算</button>

<div id="out"></div>

<script>

let P=[];

/* 玩家 */
function setPlayers(){
  P=document.getElementById("players")
    .value.split("\n")
    .map(x=>x.trim())
    .filter(x=>x);

  refresh();
}

/* UI */
function refresh(){
  document.querySelectorAll(".w").forEach(s=>{
    let v=s.value;
    s.innerHTML=P.map(p=>`<option>${p}</option>`).join("");
    if(P.includes(v)) s.value=v;
  });
}

/* row */
function addRow(){
  let tr=document.createElement("tr");
  tr.innerHTML=`
    <td><input></td>
    <td>
      <select class="w">
        ${P.map(p=>`<option>${p}</option>`).join("")}
      </select>
    </td>
    <td><input type="number"></td>
    <td><button onclick="this.parentElement.parentElement.remove()">X</button></td>
  `;
  document.getElementById("rows").appendChild(tr);
}

/* data */
function getData(){
  let d=[];
  document.querySelectorAll("#rows tr").forEach(r=>{
    let item=r.children[0].querySelector("input").value;
    let w=r.children[1].querySelector("select").value;
    let a=Number(r.children[2].querySelector("input").value);
    if(item&&w&&a) d.push({winner:w,amount:a});
  });
  return d;
}

/* core */
function calcNet(data){

  let income={}, spend={};

  P.forEach(p=>{
    income[p]=0;
    spend[p]=0;
  });

  data.forEach(d=>{
    let n=P.length-1;
    let share=d.amount/n;

    spend[d.winner]+=d.amount;

    P.forEach(p=>{
      if(p!==d.winner) income[p]+=share;
    });
  });

  let net={};
  P.forEach(p=>net[p]=income[p]-spend[p]);

  return net;
}

/* settle */
function settle(net){

  let pos=[], neg=[];

  P.forEach(p=>{
    if(net[p]>0) pos.push([p,net[p]]);
    if(net[p]<0) neg.push([p,-net[p]]);
  });

  let res=[];
  let i=0,j=0;

  while(i<pos.length && j<neg.length){

    let pay=Math.min(pos[i][1],neg[j][1]);

    res.push({
      from:neg[j][0],
      to:pos[i][0],
      amount:Math.round(pay)
    });

    pos[i][1]-=pay;
    neg[j][1]-=pay;

    if(pos[i][1]===0) i++;
    if(neg[j][1]===0) j++;
  }

  return res;
}

/* render */
function render(net,res){

  let html="<h3>Net</h3><table><tr><th>人</th><th>金額</th></tr>";

  P.forEach(p=>{
    html+=`<tr><td>${p}</td><td>${net[p].toFixed(2)}</td></tr>`;
  });

  html+="</table>";

  html+="<h3>轉帳</h3><table><tr><th>From</th><th>To</th><th>Amount</th></tr>";

  res.forEach(r=>{
    html+=`<tr><td>${r.from}</td><td>${r.to}</td><td>${r.amount}</td></tr>`;
  });

  html+="</table>";

  document.getElementById("out").innerHTML=html;
}

/* main */
function calc(){
  let data=getData();
  let net=calcNet(data);
  let res=settle(net);
  render(net,res);
}

</script>

</body>
</html>
