<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>BOSS 分帳 v18（最終穩定版）</title>

<style>
body {
  font-family: Arial;
  background:#0f0f0f;
  color:#fff;
  padding:20px;
}

textarea, input, select, button {
  margin:4px;
  padding:6px;
}

table {
  border-collapse: collapse;
  margin-top:10px;
  background:#1e1e1e;
}

th, td {
  border:1px solid #444;
  padding:6px;
  text-align:center;
  min-width:80px;
}
</style>
</head>

<body>

<h2>🏦 BOSS 分帳 v18</h2>

<h3>👥 玩家</h3>
<textarea id="playersInput"></textarea><br>
<button onclick="updatePlayers()">更新</button>

<h3>📦 結標</h3>
<table>
<thead>
<tr><th>物品</th><th>得標者</th><th>金額</th><th></th></tr>
</thead>
<tbody id="rows"></tbody>
</table>

<button onclick="addRow()">新增</button>
<button onclick="calculate()">計算</button>

<div id="report"></div>

<script>

let players=[];

function updatePlayers(){
  players=document.getElementById("playersInput")
  .value.split("\n").map(x=>x.trim()).filter(x=>x);
  refresh();
}

function refresh(){
  document.querySelectorAll(".winner").forEach(sel=>{
    let v=sel.value;
    sel.innerHTML=`<option value="">選擇</option>`+
    players.map(p=>`<option>${p}</option>`).join("");
    if(players.includes(v)) sel.value=v;
  });
}

function addRow(){
  let tr=document.createElement("tr");
  tr.innerHTML=`
  <td><input></td>
  <td><select class="winner">${players.map(p=>`<option>${p}</option>`).join("")}</select></td>
  <td><input type="number"></td>
  <td><button onclick="this.parentElement.parentElement.remove()">X</button></td>
  `;
  document.getElementById("rows").appendChild(tr);
}
addRow();

function getData(){
  let d=[];
  document.querySelectorAll("#rows tr").forEach(r=>{
    let item=r.children[0].querySelector("input").value;
    let w=r.children[1].querySelector("select").value;
    let a=Number(r.children[2].querySelector("input").value);
    if(item&&w&&a) d.push({item,winner:w,amount:a});
  });
  return d;
}

/* ================= Ledger ================= */
function computeLedger(data){

  let income={},spend={};
  players.forEach(p=>{income[p]=0;spend[p]=0});

  data.forEach(d=>{
    let n=players.length-1;
    let share=Math.floor(d.amount/n);
    let rem=d.amount-share*n;

    spend[d.winner]+=d.amount;

    players.forEach(p=>{
      if(p!==d.winner) income[p]+=share;
    });

    let targets=players.filter(p=>p!==d.winner)
    .sort((a,b)=>income[a]-income[b]);

    let i=0;
    while(rem>0 && i<targets.length){
      let give=Math.min(rem,50);
      if(give<50) give=rem;
      income[targets[i]]+=give;
      rem-=give;
      i++;
    }
  });

  let net={};
  players.forEach(p=>net[p]=income[p]-spend[p]);

  return {income,spend,net};
}

/* ================= Matrix ================= */
function buildMatrix(net){

  let payers=players.filter(p=>net[p]<0);
  let receivers=players.filter(p=>net[p]>0);

  let payLeft={},recLeft={};
  payers.forEach(p=>payLeft[p]=-net[p]);
  receivers.forEach(p=>recLeft[p]=net[p]);

  receivers.sort((a,b)=>recLeft[b]-recLeft[a]);

  let matrix={};
  players.forEach(r=>{
    matrix[r]={};
    payers.forEach(p=>matrix[r][p]="");
  });

  receivers.forEach(r=>{

    let need=recLeft[r];
    let history=[];

    for(let p of payers){

      if(need<=0) break;

      let available=payLeft[p];
      if(available<=0) continue;

      let pay=Math.min(available, need);

      if(pay<50 && need>50) continue;

      matrix[r][p]=pay;
      history.push({payer:p,amount:pay});

      payLeft[p]-=pay;
      need-=pay;
    }

    // 🔥 回溯修正（避免 <50）
    if(need>0 && need<50 && history.length>0){

      let last=history[history.length-1];
      let borrow=50-need;

      if(last.amount>borrow){

        matrix[r][last.payer]-=borrow;
        matrix[r][last.payer+"__fix"]=borrow+need; // merge

        need=0;
      }
    }
  });

  return {matrix,payers};
}

/* ================= Render ================= */
function render(res,matrixData){

  let matrix=matrixData.matrix;
  let payers=matrixData.payers;

  let html=`<h3>結算</h3><table>
  <tr><th>玩家</th><th>支出</th><th>收入</th><th>淨值</th></tr>`;

  players.forEach(p=>{
    html+=`<tr>
    <td>${p}</td>
    <td>${res.spend[p]}</td>
    <td>${res.income[p]}</td>
    <td>${res.net[p]}</td>
    </tr>`;
  });

  html+=`</table>`;

  html+=`<h3>轉帳矩陣</h3><table><tr><th>收款人\\付款人</th>`;

  payers.forEach(p=>html+=`<th>${p}</th>`);
  html+=`</tr>`;

  players.filter(r=>res.net[r]>0).forEach(r=>{

    html+=`<tr><th>${r}</th>`;

    payers.forEach(p=>{
      let val = matrix[r][p] || "";
      html+=`<td>${val}</td>`;
    });

    html+=`</tr>`;
  });

  html+=`</table>`;

  document.getElementById("report").innerHTML=html;
}

/* ================= Main ================= */
function calculate(){

  if(players.length<2){
    alert("玩家不足");
    return;
  }

  let data=getData();
  let res=computeLedger(data);
  let matrix=buildMatrix(res.net);

  render(res,matrix);
}

</script>

</body>
</html>
