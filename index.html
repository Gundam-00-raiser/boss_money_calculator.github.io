<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>BOSS 分帳 Pro v2</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>
body {
  font-family: Arial;
  background:#111;
  color:#fff;
  padding:20px;
}

textarea, input, select, button {
  padding:6px;
  margin:4px;
}

table {
  border-collapse: collapse;
  margin-top:10px;
  background:#1e1e1e;
}

th, td {
  border:1px solid #444;
  padding:6px;
  text-align:center;
  min-width:90px;
}

.section {
  margin-top:20px;
}

#report {
  margin-top:20px;
}
</style>
</head>

<body>

<h2>🏦 BOSS 分帳 Pro v2</h2>

<!-- =====================
     玩家資料庫
===================== -->
<div class="section">
<h3>👥 玩家清單（直接貼上，換行）</h3>

<textarea id="playerInput" rows="6" placeholder="A&#10;B&#10;C"></textarea>
<br>
<button onclick="updatePlayers()">更新玩家名單</button>
</div>

<!-- =====================
     結標區
===================== -->
<div class="section">
<h3>📦 結標區</h3>

<table>
<thead>
<tr>
  <th>物品</th>
  <th>得標者</th>
  <th>金額</th>
  <th>操作</th>
</tr>
</thead>
<tbody id="rows"></tbody>
</table>

<button onclick="addRow()">新增列</button>
<button onclick="calculate()">計算</button>
</div>

<hr>

<div id="report"></div>

<script>

let players = [];

// =====================
// 更新玩家名單
// =====================
function updatePlayers() {

  players = document.getElementById("playerInput")
    .value.split("\n")
    .map(x => x.trim())
    .filter(x => x);

  refreshDropdowns();
}

// =====================
// 更新所有下拉選單
// =====================
function refreshDropdowns() {

  document.querySelectorAll(".winner").forEach(sel => {

    const old = sel.value;

    sel.innerHTML =
      `<option value="">選擇得標者</option>` +
      players.map(p => `<option value="${p}">${p}</option>`).join("");

    sel.value = players.includes(old) ? old : "";
  });
}

// =====================
// 新增列
// =====================
function addRow() {

  const tr = document.createElement("tr");

  tr.innerHTML = `
    <td><input></td>
    <td>
      <select class="winner">
        <option value="">選擇得標者</option>
        ${players.map(p => `<option value="${p}">${p}</option>`).join("")}
      </select>
    </td>
    <td><input type="number"></td>
    <td><button onclick="this.parentElement.parentElement.remove()">刪除</button></td>
  `;

  document.getElementById("rows").appendChild(tr);
}

addRow();

// =====================
// 核心計算（GAS一致版）
// =====================
function calculate() {

  let data = [];

  document.querySelectorAll("#rows tr").forEach(r => {

    const item = r.children[0].querySelector("input").value;
    const winner = r.children[1].querySelector("select").value;
    const amount = Number(r.children[2].querySelector("input").value);

    if (item && winner && amount) {
      data.push({ item, winner, amount });
    }
  });

  if (players.length < 2) {
    alert("玩家數不足");
    return;
  }

  let spend = {};
  let income = {};

  players.forEach(p => {
    spend[p] = 0;
    income[p] = 0;
  });

  // =====================
  // SPEND
  // =====================
  data.forEach(d => {
    spend[d.winner] += d.amount;
  });

  // =====================
  // INCOME（完全 GAS）
  // =====================
  data.forEach(d => {

    const n = players.length;
    const share = Math.floor(d.amount / (n - 1));
    const remainder = d.amount - share * (n - 1);

    players.forEach(p => {
      if (p !== d.winner) income[p] += share;
    });

    income[d.winner] += remainder;
  });

  // =====================
  // NET
  // =====================
  let net = {};
  players.forEach(p => {
    net[p] = income[p] - spend[p];
  });

  // =====================
  // TRANSFER
  // =====================
  let creditors = [];
  let debtors = [];

  players.forEach(p => {
    if (net[p] > 0) creditors.push({ p, v: net[p] });
    if (net[p] < 0) debtors.push({ p, v: -net[p] });
  });

  let transfers = [];

  while (creditors.length && debtors.length) {

    let c = creditors[0];
    let d = debtors[0];

    let pay = Math.min(c.v, d.v);

    if (pay < 50) break;

    transfers.push({
      from: d.p,
      to: c.p,
      amount: Math.round(pay)
    });

    c.v -= pay;
    d.v -= pay;

    if (c.v <= 0) creditors.shift();
    if (d.v <= 0) debtors.shift();
  }

  render(spend, income, net, transfers);
}

// =====================
// render UI
// =====================
function render(spend, income, net, transfers) {

  let html = `<h3>📊 結算</h3>
  <table>
  <tr><th>玩家</th><th>支出</th><th>收入</th><th>淨值</th></tr>`;

  players.forEach(p => {
    html += `<tr>
      <td>${p}</td>
      <td>${spend[p]}</td>
      <td>${income[p]}</td>
      <td>${net[p]}</td>
    </tr>`;
  });

  html += "</table>";

  html += `<h3>💸 轉帳明細</h3>
  <table>
  <tr><th>付款人</th><th>收款人</th><th>金額</th></tr>`;

  transfers.forEach(t => {
    html += `<tr>
      <td>${t.from}</td>
      <td>${t.to}</td>
      <td>${t.amount}</td>
    </tr>`;
  });

  html += "</table>";

  document.getElementById("report").innerHTML = html;
}

</script>

</body>
</html>
